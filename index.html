<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>At All Times</title>
<meta name="description" content="Find a verse for how you feel.">
<meta name="theme-color" content="#40604F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="At All Times">
<style>
:root{
  --ink:#26332E;
  --ink-soft:#5A6A62;
  --paper:#F4F6F3;
  --card:#FFFFFF;
  --line:#E3E8E2;
  --sage:#7E9B8C;
  --deep:#40604F;
  --gold:#B99548;
  --tint:#7E9B8C;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--paper);color:var(--ink);
  min-height:100vh;line-height:1.55;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
}
.serif{font-family:Georgia,'Times New Roman',serif}
#app{max-width:560px;margin:0 auto;padding:16px 18px 24px}

/* header */
.top{display:flex;align-items:center;gap:10px;padding:14px 2px 6px;min-height:52px}
.top h1{font-family:Georgia,serif;font-weight:400;font-size:1.35rem;letter-spacing:.01em}
.top .sub{color:var(--ink-soft);font-size:.85rem;margin-top:1px}
.back{
  border:none;background:var(--card);color:var(--deep);
  width:40px;height:40px;border-radius:50%;font-size:1.1rem;cursor:pointer;
  box-shadow:0 1px 3px rgba(38,51,46,.08);flex:none;
}
.crumb{font-size:.8rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em}
.page-title{font-family:Georgia,serif;font-weight:400;font-size:1.5rem;margin-top:2px}

/* tint wash follows the emotion branch */
.wash{
  position:fixed;inset:0 0 auto 0;height:190px;z-index:-1;
  background:linear-gradient(to bottom, color-mix(in srgb, var(--tint) 16%, var(--paper)), var(--paper));
  transition:background .5s ease;
}
@supports not (background: color-mix(in srgb, red 10%, blue)){
  .wash{background:linear-gradient(to bottom, rgba(126,155,140,.14), var(--paper))}
}

/* memory verse card */
.mem{
  background:var(--card);border-radius:var(--radius);padding:18px 18px 14px;
  box-shadow:0 2px 10px rgba(38,51,46,.06);margin:10px 0 20px;
  border-top:3px solid var(--gold);
}
.mem .label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600}
.mem .vtext{font-family:Georgia,serif;font-size:1.12rem;line-height:1.6;margin:10px 0 6px;min-height:3em}
.mem .vref{color:var(--ink-soft);font-size:.9rem;font-style:italic}
.mem .tools{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.chip{
  border:1px solid var(--line);background:var(--paper);color:var(--deep);
  border-radius:999px;padding:7px 14px;font-size:.83rem;cursor:pointer;font-weight:500;
}
.chip.active{background:var(--deep);color:#fff;border-color:var(--deep)}
.mem .hint{font-size:.78rem;color:var(--ink-soft);margin-top:8px}

/* emotion grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.etile{
  background:var(--card);border:none;border-radius:var(--radius);
  padding:18px 14px 16px;cursor:pointer;text-align:left;
  box-shadow:0 1px 4px rgba(38,51,46,.06);
  display:flex;flex-direction:column;gap:8px;
  transition:transform .12s ease;
}
.etile:active{transform:scale(.97)}
.etile .dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.etile .dot svg{width:20px;height:20px}
.etile .dot .emo{font-size:1.3rem;line-height:1;filter:saturate(.55) contrast(.95);opacity:.85}
.etile .name{font-family:Georgia,serif;font-size:1.08rem;color:var(--ink)}
.etile .count{font-size:.76rem;color:var(--ink-soft)}

/* sub-emotion list */
.sublist{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.subbtn{
  background:var(--card);border:none;border-radius:var(--radius);
  padding:16px 18px;cursor:pointer;text-align:left;font-size:1rem;color:var(--ink);
  box-shadow:0 1px 4px rgba(38,51,46,.06);
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  font-family:Georgia,serif;
}
.subbtn .arrow{color:var(--tint);font-size:1.1rem}

/* passage cards */
.pcard{
  background:var(--card);border-radius:var(--radius);padding:18px;
  box-shadow:0 1px 5px rgba(38,51,46,.06);margin-top:14px;
  border-left:3px solid var(--tint);
}
.pcard .vtext{font-family:Georgia,serif;font-size:1.08rem;line-height:1.65}
.pcard .vref{margin-top:8px;font-style:italic;color:var(--ink-soft);font-size:.9rem;display:flex;justify-content:space-between;align-items:center}
.fav{
  border:none;background:none;cursor:pointer;font-size:1.25rem;line-height:1;
  color:#C9CFC8;padding:4px;
}
.fav.on{color:var(--gold)}
.pcard .why{margin-top:12px;font-size:.93rem;color:var(--ink)}
.pcard .why b{font-weight:600;color:var(--ink-soft);font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:3px}
.pcard .pray{
  margin-top:12px;padding:12px 14px;background:var(--paper);border-radius:10px;
  font-size:.92rem;font-style:italic;color:var(--ink-soft);
}
.pcard .pray b{font-style:normal;font-weight:600;color:var(--deep);font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:3px}

/* story cards */
.sechead{margin:26px 0 4px;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.story{
  background:color-mix(in srgb, var(--tint) 8%, var(--card));
  border-radius:var(--radius);padding:16px 18px;margin-top:12px;
}
@supports not (background: color-mix(in srgb, red 10%, blue)){ .story{background:var(--card)} }
.story .stitle{font-family:Georgia,serif;font-size:1.02rem}
.story .hook{font-size:.9rem;color:var(--ink-soft);margin-top:6px}
.story .readit{
  display:inline-block;margin-top:10px;font-size:.85rem;font-weight:600;color:var(--deep);
  background:var(--card);border-radius:999px;padding:6px 14px;
}

/* favorites + journal */
.empty{
  text-align:center;color:var(--ink-soft);padding:48px 24px;font-size:.95rem;
}
.empty .big{font-family:Georgia,serif;font-size:1.2rem;color:var(--ink);margin-bottom:8px}
textarea{
  width:100%;border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;font-family:inherit;font-size:1rem;background:var(--card);color:var(--ink);
  min-height:110px;resize:vertical;
}
textarea:focus{outline:2px solid var(--sage);border-color:transparent}
.btn{
  border:none;background:var(--deep);color:#fff;border-radius:999px;
  padding:11px 22px;font-size:.92rem;font-weight:600;cursor:pointer;margin-top:10px;
}
.btn:disabled{opacity:.4}
.jentry{
  background:var(--card);border-radius:var(--radius);padding:16px 18px;margin-top:12px;
  box-shadow:0 1px 4px rgba(38,51,46,.05);
}
.jentry .jdate{font-size:.76rem;color:var(--ink-soft);letter-spacing:.05em;display:flex;justify-content:space-between}
.jentry .jtext{margin-top:6px;font-size:.95rem;white-space:pre-wrap}
.jdel{border:none;background:none;color:#B5876F;font-size:.76rem;cursor:pointer;padding:2px}

/* bottom nav */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:rgba(255,255,255,.94);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));
}
nav button{
  border:none;background:none;cursor:pointer;color:var(--ink-soft);
  font-size:.72rem;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 18px;font-weight:500;
}
nav button svg{width:22px;height:22px}
nav button.active{color:var(--deep)}

footer{margin-top:36px;text-align:center;font-size:.68rem;color:#9AA69F;line-height:1.5;padding:0 12px}

@media (prefers-reduced-motion: reduce){
  *{transition:none !important;animation:none !important}
}
button:focus-visible, textarea:focus-visible, .readit:focus-visible{outline:2px solid var(--deep);outline-offset:2px}
</style>
</head>
<body>
<div class="wash" id="wash"></div>
<div id="app"></div>
<nav id="nav"></nav>
<script>
// ============ CONTENT ============
const DATA = [
{id:"sad",name:"Sad",tint:"#7C93A8",emoji:"😢",icon:"drop",subs:[
 {id:"grieving",name:"Grieving a loss",passages:[
  {ref:"Psalm 34:18",text:"The LORD is near to the brokenhearted and saves the crushed in spirit.",why:"When your heart is broken, God doesn't stand far away. He moves closer.",pray:"God, my heart hurts. Thank you for being near me right now, even when I can't feel it."},
  {ref:"Matthew 5:4",text:"Blessed are those who mourn, for they shall be comforted.",why:"Jesus says grief isn't weakness. He promises comfort is coming for people who mourn.",pray:"Jesus, I'm mourning. Please bring the comfort you promised."},
  {ref:"Revelation 21:4",text:"He will wipe away every tear from their eyes, and death shall be no more, neither shall there be mourning, nor crying, nor pain anymore, for the former things have passed away.",why:"This sadness is not forever. One day God himself will wipe away every tear — including yours.",pray:"Father, help me hold on to the day when you'll make everything new."}],
 stories:[
  {title:"Jesus cries at his friend's grave",hook:"Even though Jesus knew he was about to raise Lazarus, he stopped and wept with the people he loved. God understands tears.",ref:"John 11:1-44"},
  {title:"Naomi loses everything",hook:"Naomi lost her husband and both sons, and she didn't hide how bitter she felt. God quietly rebuilt her life through Ruth's loyal love.",ref:"Ruth 1"}]},
 {id:"disappointed",name:"Disappointed",passages:[
  {ref:"Romans 8:28",text:"And we know that for those who love God all things work together for good, for those who are called according to his purpose.",why:"Even things that didn't go your way aren't wasted. God can weave disappointment into something good.",pray:"God, this isn't how I wanted things to go. Help me trust that you're still working."},
  {ref:"Psalm 42:11",text:"Why are you cast down, O my soul, and why are you in turmoil within me? Hope in God; for I shall again praise him, my salvation and my God.",why:"The writer talks to his own sad heart and tells it where to look. You can do the same.",pray:"Lord, my hope feels flat. Lift my eyes back up to you."},
  {ref:"Habakkuk 3:17-18",text:"Though the fig tree should not blossom, nor fruit be on the vines... yet I will rejoice in the LORD; I will take joy in the God of my salvation.",why:"Habakkuk chose joy in God even when everything he hoped for fell through. Joy can survive disappointment.",pray:"God, even though this didn't work out, I choose to trust you anyway."}],
 stories:[
  {title:"Joseph, forgotten in prison",hook:"Joseph helped the king's cupbearer, who promised to remember him — then forgot him for two whole years. God hadn't forgotten.",ref:"Genesis 40"}]},
 {id:"hurt",name:"Hurt by someone",passages:[
  {ref:"Psalm 147:3",text:"He heals the brokenhearted and binds up their wounds.",why:"God treats hurt hearts like a doctor treats wounds — carefully, personally, one bandage at a time.",pray:"God, someone hurt me. Please start healing the part of me that's wounded."},
  {ref:"Ephesians 4:32",text:"Be kind to one another, tenderhearted, forgiving one another, as God in Christ forgave you.",why:"Forgiving doesn't mean it didn't matter. It means you hand the hurt to God instead of carrying it.",pray:"Jesus, forgiving feels hard. Help me forgive the way you forgave me."},
  {ref:"1 Peter 5:7",text:"...casting all your anxieties on him, because he cares for you.",why:"You don't have to process this alone. God genuinely cares about what was done to you.",pray:"Father, I'm giving you this hurt because you care about me."}],
 stories:[
  {title:"Joseph forgives his brothers",hook:"His own brothers sold him as a slave. Years later Joseph wept, forgave them, and said God had turned their evil into good.",ref:"Genesis 45:1-15"},
  {title:"David spares the man hunting him",hook:"King Saul was trying to kill David, and David got the perfect chance for revenge — and chose not to take it.",ref:"1 Samuel 24"}]},
 {id:"hopeless",name:"Hopeless",passages:[
  {ref:"Lamentations 3:22-23",text:"The steadfast love of the LORD never ceases; his mercies never come to an end; they are new every morning; great is your faithfulness.",why:"This was written in the middle of a disaster. Even there, God's mercy showed up fresh every single morning.",pray:"God, I need new mercy this morning. Thank you that yours never runs out."},
  {ref:"Romans 15:13",text:"May the God of hope fill you with all joy and peace in believing, so that by the power of the Holy Spirit you may abound in hope.",why:"Hope isn't something you have to manufacture. God is called the God of hope — he fills people with it.",pray:"God of hope, fill me back up. I'm running on empty."},
  {ref:"Psalm 46:1",text:"God is our refuge and strength, a very present help in trouble.",why:"Not a distant help. A very present one — right here, right now, in this exact trouble.",pray:"Lord, be my refuge today. I can't do this on my own strength."}],
 stories:[
  {title:"Trapped at the Red Sea",hook:"Israel stood with the sea in front of them and an army behind them — no way out. Then God made a road through the water.",ref:"Exodus 14"}]}
]},
{id:"anxious",name:"Anxious",tint:"#9A8FB5",emoji:"😰",icon:"waves",subs:[
 {id:"future",name:"Worried about the future",passages:[
  {ref:"Matthew 6:34",text:"Therefore do not be anxious about tomorrow, for tomorrow will be anxious for itself. Sufficient for the day is its own trouble.",why:"Jesus says you only have to live one day at a time. Tomorrow's worries aren't yours to carry today.",pray:"Jesus, help me let go of tomorrow and just be faithful today."},
  {ref:"Jeremiah 29:11",text:"For I know the plans I have for you, declares the LORD, plans for welfare and not for evil, to give you a future and a hope.",why:"Your future isn't a mystery to God. He already has plans for it — good ones.",pray:"God, I can't see my future, but you can. I trust your plans."},
  {ref:"Philippians 4:6-7",text:"Do not be anxious about anything, but in everything by prayer and supplication with thanksgiving let your requests be made known to God. And the peace of God, which surpasses all understanding, will guard your hearts and your minds in Christ Jesus.",why:"The trade God offers: give him your worries, and he gives you peace that doesn't even make sense.",pray:"Father, here's everything I'm worried about. Guard my heart with your peace."}],
 stories:[
  {title:"Abraham leaves home with no map",hook:"God told Abraham to pack up and go — without telling him where. He went anyway, one step at a time, and God kept every promise.",ref:"Genesis 12:1-9"}]},
 {id:"scared",name:"Scared of something",passages:[
  {ref:"Isaiah 41:10",text:"Fear not, for I am with you; be not dismayed, for I am your God; I will strengthen you, I will help you, I will uphold you with my righteous right hand.",why:"Five promises in one verse: God is with you, is your God, will strengthen, help, and hold you up.",pray:"God, I'm scared. Hold me up with your strong hand."},
  {ref:"Psalm 56:3",text:"When I am afraid, I put my trust in you.",why:"David doesn't say if I'm afraid — he says when. Fear happens. Trust is what you do with it.",pray:"Lord, I'm afraid right now, so right now I'm choosing to trust you."},
  {ref:"Joshua 1:9",text:"Have I not commanded you? Be strong and courageous. Do not be frightened, and do not be dismayed, for the LORD your God is with you wherever you go.",why:"Courage isn't the absence of fear — it's knowing God goes with you wherever you go.",pray:"God, make me strong and courageous, because you're coming with me."}],
 stories:[
  {title:"Jesus calms the storm",hook:"The disciples were sure they were going to drown while Jesus slept in the boat. Then he stood up and told the storm to be quiet — and it obeyed.",ref:"Mark 4:35-41"},
  {title:"David faces the giant",hook:"Everyone else saw a giant too big to fight. David saw a giant too big to miss — because he knew who was with him.",ref:"1 Samuel 17"}]},
 {id:"others",name:"Nervous about what people think",passages:[
  {ref:"Psalm 118:6",text:"The LORD is on my side; I will not fear. What can man do to me?",why:"When the God of the universe is for you, other people's opinions shrink down to size.",pray:"Lord, remind me that you're on my side, so I don't have to fear what people think."},
  {ref:"Galatians 1:10",text:"For am I now seeking the approval of man, or of God? Or am I trying to please man? If I were still trying to please man, I would not be a servant of Christ.",why:"You can't perform for everyone. Paul decided whose approval actually mattered — and it set him free.",pray:"God, help me care more about pleasing you than impressing people."},
  {ref:"Zephaniah 3:17",text:"The LORD your God is in your midst, a mighty one who will save; he will rejoice over you with gladness; he will quiet you by his love; he will exult over you with loud singing.",why:"While you're worrying whether people like you, God is singing over you with joy.",pray:"Father, quiet my nerves with your love. Thank you for delighting in me."}],
 stories:[
  {title:"Moses says “I can't speak well”",hook:"Moses was so nervous about what people would think of his speaking that he begged God to send someone else. God used him anyway.",ref:"Exodus 3:10-4:17"}]},
 {id:"school",name:"Stressed about school",passages:[
  {ref:"Colossians 3:23",text:"Whatever you do, work heartily, as for the Lord and not for men.",why:"That test, that assignment — do it for God, not for a grade or a teacher. It changes the pressure into purpose.",pray:"Lord, help me do my work today for you, and let that be enough."},
  {ref:"Philippians 4:13",text:"I can do all things through him who strengthens me.",why:"Paul wrote this about handling hard circumstances. God's strength shows up right where yours runs out.",pray:"Jesus, I'm running low. Strengthen me for what's in front of me."},
  {ref:"Matthew 6:33",text:"But seek first the kingdom of God and his righteousness, and all these things will be added to you.",why:"Put God first and let him handle the rest of the stack. He knows what you need.",pray:"God, help me put you first today and trust you with everything else on my list."}],
 stories:[
  {title:"Daniel, the student far from home",hook:"Daniel was a teenager taken to a foreign kingdom and enrolled in its hardest school. He stayed faithful to God, and God gave him wisdom beyond everyone around him.",ref:"Daniel 1"}]}
]},
{id:"angry",name:"Angry",tint:"#B08578",emoji:"😠",icon:"flame",subs:[
 {id:"unfair",name:"Treated unfairly",passages:[
  {ref:"Romans 12:19",text:"Beloved, never avenge yourselves, but leave it to the wrath of God, for it is written, “Vengeance is mine, I will repay, says the Lord.”",why:"You don't have to settle the score. God saw what happened, and justice is his job.",pray:"God, this was unfair. I'm handing it to you instead of getting even."},
  {ref:"Psalm 37:7-8",text:"Be still before the LORD and wait patiently for him; fret not yourself over the one who prospers in his way... Refrain from anger, and forsake wrath! Fret not yourself; it tends only to evil.",why:"Stewing over unfairness only burns you. Being still before God is where the anger cools.",pray:"Lord, help me be still and wait for you instead of boiling inside."},
  {ref:"1 Peter 2:23",text:"When he was reviled, he did not revile in return; when he suffered, he did not threaten, but continued entrusting himself to him who judges justly.",why:"Jesus was treated more unfairly than anyone — and he entrusted himself to the Judge who gets it right.",pray:"Jesus, help me respond like you did: trusting the Father instead of firing back."}],
 stories:[
  {title:"Sold by his own brothers",hook:"Joseph's brothers sold him into slavery out of jealousy. Decades later he told them, “You meant evil against me, but God meant it for good.”",ref:"Genesis 37 & 50:15-21"}]},
 {id:"frustrated",name:"Frustrated",passages:[
  {ref:"James 1:19-20",text:"Know this, my beloved brothers: let every person be quick to hear, slow to speak, slow to anger; for the anger of man does not produce the righteousness of God.",why:"Quick to listen, slow to speak, slow to anger — in that order. Frustration usually reverses all three.",pray:"God, slow me down. Make me quick to listen before I react."},
  {ref:"Proverbs 19:11",text:"Good sense makes one slow to anger, and it is his glory to overlook an offense.",why:"Letting something go isn't weakness — Scripture calls it your glory.",pray:"Lord, give me the good sense to let this go."},
  {ref:"Ecclesiastes 7:9",text:"Be not quick in your spirit to become angry, for anger lodges in the heart of fools.",why:"Anger that moves in and unpacks its bags makes a person foolish. Don't give it a room.",pray:"Father, don't let this frustration take up residence in my heart."}],
 stories:[
  {title:"Jonah and the plant",hook:"Jonah got so frustrated when things didn't go his way that he told God he'd rather die — over a plant. God gently showed him how small his anger really was.",ref:"Jonah 4"}]},
 {id:"madat",name:"Mad at someone",passages:[
  {ref:"Ephesians 4:26-27",text:"Be angry and do not sin; do not let the sun go down on your anger, and give no opportunity to the devil.",why:"Anger itself isn't the sin — it's what you do with it, and how long you keep it. Deal with it before bed.",pray:"God, I'm angry at someone. Help me deal with it today instead of sleeping on it."},
  {ref:"Colossians 3:13",text:"...bearing with one another and, if one has a complaint against another, forgiving each other; as the Lord has forgiven you, so you also must forgive.",why:"The measuring stick for forgiving them is how much Christ forgave you. That settles it.",pray:"Jesus, you forgave me everything. Help me forgive them this."},
  {ref:"Matthew 5:23-24",text:"So if you are offering your gift at the altar and there remember that your brother has something against you... First be reconciled to your brother, and then come and offer your gift.",why:"Jesus says making things right with people is so important it comes before worship. Go talk to them.",pray:"Lord, give me the courage to go make this right."}],
 stories:[
  {title:"The older brother stays outside",hook:"When the prodigal son came home, his older brother was too angry to join the party. The father came outside and pleaded with him too — both sons were loved.",ref:"Luke 15:25-32"},
  {title:"Esau runs to embrace Jacob",hook:"Jacob had cheated Esau badly, and Esau had every right to stay furious. Instead, after twenty years, he ran to his brother and hugged him.",ref:"Genesis 33:1-11"}]},
 {id:"atmyself",name:"Angry at myself",passages:[
  {ref:"Psalm 103:13-14",text:"As a father shows compassion to his children, so the LORD shows compassion to those who fear him. For he knows our frame; he remembers that we are dust.",why:"God isn't shocked by your failure. He knows exactly what you're made of — and responds with compassion, like a good dad.",pray:"Father, I keep beating myself up. Show me the compassion you promise."},
  {ref:"2 Corinthians 12:9",text:"But he said to me, “My grace is sufficient for you, for my power is made perfect in weakness.”",why:"Your weak spots aren't disqualifying. They're exactly where God's power likes to work.",pray:"God, take this weakness I hate about myself and show your power through it."},
  {ref:"Romans 8:1",text:"There is therefore now no condemnation for those who are in Christ Jesus.",why:"If you belong to Jesus, the verdict is already in: no condemnation. Stop running a trial he already closed.",pray:"Jesus, thank you that you don't condemn me — help me stop condemning myself."}],
 stories:[
  {title:"Moses' worst mistake",hook:"Moses killed a man and ran into the desert, sure his life was over. Forty years later, God met him at a burning bush and gave him his greatest calling.",ref:"Exodus 2:11-15 & 3:1-12"}]}
]},
{id:"happy",name:"Happy",tint:"#C0A45E",emoji:"😊",icon:"sun",subs:[
 {id:"thankful",name:"Thankful",passages:[
  {ref:"Psalm 107:1",text:"Oh give thanks to the LORD, for he is good, for his steadfast love endures forever!",why:"Gratitude has an address. When something good happens, this is where the thank-you goes.",pray:"God, thank you! You are good, and today I can feel it."},
  {ref:"1 Thessalonians 5:16-18",text:"Rejoice always, pray without ceasing, give thanks in all circumstances; for this is the will of God in Christ Jesus for you.",why:"Ever wonder what God's will for you is? Here's part of it, spelled out: rejoice, pray, give thanks.",pray:"Father, keep me thankful — not just today when it's easy, but in everything."},
  {ref:"James 1:17",text:"Every good gift and every perfect gift is from above, coming down from the Father of lights, with whom there is no variation or shadow due to change.",why:"Trace any good thing far enough back and you find God. He's the source of all of it.",pray:"Father of lights, I see your fingerprints on the good things in my life. Thank you."}],
 stories:[
  {title:"The one who came back",hook:"Jesus healed ten lepers, but only one turned around to say thank you. Jesus noticed. He always notices gratitude.",ref:"Luke 17:11-19"}]},
 {id:"excited",name:"Excited",passages:[
  {ref:"Psalm 118:24",text:"This is the day that the LORD has made; let us rejoice and be glad in it.",why:"This exact day was made by God. Your excitement fits right into it.",pray:"Lord, you made this day — thank you! I'm going to enjoy it with you."},
  {ref:"Nehemiah 8:10",text:"...the joy of the LORD is your strength.",why:"Joy isn't just a feeling; it's fuel. God designed happiness to make you strong.",pray:"God, let this joy be strength for whatever comes next."},
  {ref:"Psalm 16:11",text:"You make known to me the path of life; in your presence there is fullness of joy; at your right hand are pleasures forevermore.",why:"The happiest moments here are a preview. Full joy — the maximum — is found in God's presence.",pray:"God, this happiness points me to you. Thank you for fullness of joy."}],
 stories:[
  {title:"David dances with all his might",hook:"When the ark came home to Jerusalem, King David was so overjoyed he danced in the street without caring who was watching.",ref:"2 Samuel 6:12-15"}]},
 {id:"proud",name:"Proud of something I did",passages:[
  {ref:"Colossians 3:17",text:"And whatever you do, in word or deed, do everything in the name of the Lord Jesus, giving thanks to God the Father through him.",why:"Enjoy the win — and sign it over. Accomplishments feel even better when they're done in his name.",pray:"Jesus, thank you for this accomplishment. I want it to honor you."},
  {ref:"Psalm 90:17",text:"Let the favor of the Lord our God be upon us, and establish the work of our hands upon us; yes, establish the work of our hands!",why:"Ask God to make what you built last. He loves establishing the work of your hands.",pray:"Lord, you helped my hands do this work. Please establish it."},
  {ref:"Deuteronomy 8:17-18",text:"Beware lest you say in your heart, “My power and the might of my hand have gotten me this wealth.” You shall remember the LORD your God, for it is he who gives you power...",why:"A gentle check for good days: the ability itself was a gift. Remembering that keeps success sweet instead of swollen.",pray:"God, I worked hard — but you gave me the strength to. I remember that."}],
 stories:[
  {title:"The wall gets finished",hook:"Nehemiah's crew rebuilt Jerusalem's wall in just 52 days against constant opposition — and even their enemies knew God had helped them do it.",ref:"Nehemiah 6:15-16"}]},
 {id:"peaceful",name:"Peaceful & content",passages:[
  {ref:"Psalm 23:1-3",text:"The LORD is my shepherd; I shall not want. He makes me lie down in green pastures. He leads me beside still waters. He restores my soul.",why:"This is what contentment looks like: a sheep with a good shepherd, needing nothing, resting by quiet water.",pray:"Shepherd, thank you for this stillness. Keep restoring my soul."},
  {ref:"Philippians 4:11-12",text:"...for I have learned in whatever situation I am to be content. I know how to be brought low, and I know how to abound.",why:"Paul says contentment is learned — a skill, not luck. You're learning it right now.",pray:"God, teach me contentment that holds steady whether life is full or lean."},
  {ref:"Psalm 131:2",text:"But I have calmed and quieted my soul, like a weaned child with its mother; like a weaned child is my soul within me.",why:"A quiet soul resting near God, wanting nothing — just wanting to be close. That's the picture.",pray:"Father, I'm just glad to be near you right now."}],
 stories:[
  {title:"Mary picks the better thing",hook:"While Martha rushed around stressed, Mary just sat at Jesus' feet and listened. Jesus said she'd chosen the one thing worth choosing.",ref:"Luke 10:38-42"}]}
]},
{id:"lonely",name:"Lonely",tint:"#7FA0A3",emoji:"🥺",icon:"moon",subs:[
 {id:"leftout",name:"Left out",passages:[
  {ref:"Psalm 27:10",text:"For my father and my mother have forsaken me, but the LORD will take me in.",why:"Even if the people closest to you leave you out, God takes you in. You always have a place with him.",pray:"God, I feel left out. Thank you for taking me in when others don't."},
  {ref:"Deuteronomy 31:6",text:"Be strong and courageous. Do not fear or be in dread of them, for it is the LORD your God who goes with you. He will not leave you or forsake you.",why:"People can walk away. God has promised he never will — not once, not ever.",pray:"Lord, when I feel abandoned, remind me you haven't gone anywhere."},
  {ref:"Psalm 68:6",text:"God settles the solitary in a home...",why:"God specializes in finding places for lonely people. He's doing that for you too.",pray:"Father, settle me. Bring me the friendships and belonging you know I need."}],
 stories:[
  {title:"The overlooked youngest brother",hook:"When Samuel came to anoint a king, nobody even bothered calling David in from the fields. God picked him anyway — God sees who gets overlooked.",ref:"1 Samuel 16:1-13"}]},
 {id:"misunderstood",name:"No one understands me",passages:[
  {ref:"Hebrews 4:15-16",text:"For we do not have a high priest who is unable to sympathize with our weaknesses, but one who in every respect has been tempted as we are, yet without sin. Let us then with confidence draw near to the throne of grace...",why:"Jesus has personally felt what you're feeling. He's not guessing — he sympathizes from experience.",pray:"Jesus, you actually understand. I'm coming close to you with confidence."},
  {ref:"Psalm 139:1-3",text:"O LORD, you have searched me and known me! You know when I sit down and when I rise up; you discern my thoughts from afar... and are acquainted with all my ways.",why:"There is one person who understands you completely — down to the thoughts you can't even put into words.",pray:"God, you know me better than I know myself. Thank you that I don't have to explain."},
  {ref:"John 16:32",text:"Behold, the hour is coming, indeed it has come, when you will be scattered, each to his own home, and will leave me alone. Yet I am not alone, for the Father is with me.",why:"Jesus knew what it was to be abandoned by every friend at once. And he found the Father still there. So will you.",pray:"Father, when nobody gets it, be with me the way you were with Jesus."}],
 stories:[
  {title:"Alone in the garden",hook:"On the worst night of his life, Jesus asked his three closest friends to stay awake with him. They fell asleep — three times. He understands lonely.",ref:"Matthew 26:36-46"}]},
 {id:"missing",name:"Missing someone",passages:[
  {ref:"Psalm 73:23-26",text:"Nevertheless, I am continually with you; you hold my right hand... My flesh and my heart may fail, but God is the strength of my heart and my portion forever.",why:"When someone you love is far away, one presence never leaves — God is holding your hand right now.",pray:"God, I miss them so much. Hold my hand and be the strength of my heart."},
  {ref:"Philippians 1:3",text:"I thank my God in all my remembrance of you.",why:"Paul turned missing people into a prayer habit: every memory became a thank-you. Try it — remember them, then thank God for them.",pray:"Father, every time I think of them today, I'll thank you for them."},
  {ref:"Psalm 121:7-8",text:"The LORD will keep you from all evil; he will keep your life. The LORD will keep your going out and your coming in from this time forth and forevermore.",why:"You can't watch over the person you miss — but God can, and does, everywhere they go.",pray:"Lord, watch over them where I can't. Keep their going out and coming in."}],
 stories:[
  {title:"Ruth refuses to leave",hook:"Ruth and Naomi had both lost so much. Ruth's promise — “where you go I will go” — shows the kind of loyal love God builds between people.",ref:"Ruth 1:6-18"}]},
 {id:"invisible",name:"Feeling invisible",passages:[
  {ref:"Genesis 16:13",text:"So she called the name of the LORD who spoke to her, “You are a God of seeing,” for she said, “Truly here I have seen him who looks after me.”",why:"A runaway servant girl in the desert gave God this name: the God who sees. He saw her. He sees you.",pray:"God who sees, thank you that I am never invisible to you."},
  {ref:"Luke 12:6-7",text:"Are not five sparrows sold for two pennies? And not one of them is forgotten before God. Why, even the hairs of your head are all numbered. Fear not; you are of more value than many sparrows.",why:"God tracks sparrows and counts hairs. Nothing about you goes unnoticed by him.",pray:"Father, when I feel unseen, remind me you've counted every detail of me."},
  {ref:"Psalm 139:13-14",text:"For you formed my inward parts; you knitted me together in my mother's womb. I praise you, for I am fearfully and wonderfully made.",why:"You were personally, deliberately made by God. Invisible people don't get knitted together on purpose.",pray:"God, you made me on purpose. Help me believe I'm fearfully and wonderfully made."}],
 stories:[
  {title:"Hagar in the desert",hook:"Pregnant, mistreated, and running away, Hagar thought no one cared if she lived or died. God found her by a spring and called her by name.",ref:"Genesis 16:1-13"},
  {title:"The man in the tree",hook:"Zacchaeus was so short he had to climb a tree just to see Jesus. Out of the whole crowd, Jesus stopped, looked up, and called him by name.",ref:"Luke 19:1-10"}]}
]},
{id:"guilty",name:"Guilty",tint:"#A78A9A",emoji:"😔",icon:"heart",subs:[
 {id:"didwrong",name:"I did something wrong",passages:[
  {ref:"1 John 1:9",text:"If we confess our sins, he is faithful and just to forgive us our sins and to cleanse us from all unrighteousness.",why:"The path back is one step: confess. God's response is guaranteed — forgiveness and a clean slate.",pray:"God, I confess what I did. Thank you for forgiving me and making me clean."},
  {ref:"Proverbs 28:13",text:"Whoever conceals his transgressions will not prosper, but he who confesses and forsakes them will obtain mercy.",why:"Hiding it keeps you stuck. Owning it — and turning from it — opens the door to mercy.",pray:"Lord, I'm done hiding this. I confess it and I'm turning away from it."},
  {ref:"Psalm 51:10",text:"Create in me a clean heart, O God, and renew a right spirit within me.",why:"David prayed this after his worst failure. God doesn't just erase the record — he renews the heart.",pray:"Create in me a clean heart, God, and make my spirit right again."}],
 stories:[
  {title:"David gets caught — and comes clean",hook:"After David's biggest sin, the prophet Nathan confronted him. David didn't make excuses; he confessed — and God forgave him.",ref:"2 Samuel 12:1-13"},
  {title:"The son who came home",hook:"He'd wasted everything and rehearsed his apology the whole way back. His father ran to him before he could even finish it.",ref:"Luke 15:11-24"}]},
 {id:"cantforgive",name:"Can't forgive myself",passages:[
  {ref:"Psalm 103:11-12",text:"For as high as the heavens are above the earth, so great is his steadfast love toward those who fear him; as far as the east is from the west, so far does he remove our transgressions from us.",why:"East and west never meet. That's how far God has moved your sin from you. It's not coming back.",pray:"God, you've removed my sin as far as east is from west — help me stop dragging it back."},
  {ref:"Isaiah 43:25",text:"I, I am he who blots out your transgressions for my own sake, and I will not remember your sins.",why:"God chooses not to remember what you can't forget. If he's let it go, you're allowed to.",pray:"Lord, you've chosen to forget this. Teach my heart to let it go too."},
  {ref:"Micah 7:19",text:"He will again have compassion on us; he will tread our iniquities underfoot. You will cast all our sins into the depths of the sea.",why:"Your sin is at the bottom of the ocean. God threw it there — don't go diving for it.",pray:"Father, thank you for throwing my sin into the deep. I'm leaving it there."}],
 stories:[
  {title:"Peter's second chance",hook:"Peter denied even knowing Jesus — three times. On a beach after the resurrection, Jesus asked him three times “Do you love me?” and gave him his calling back.",ref:"John 21:15-19"}]},
 {id:"embarrassed",name:"Embarrassed",passages:[
  {ref:"Isaiah 54:4",text:"Fear not, for you will not be ashamed; be not confounded, for you will not be disgraced...",why:"God's long-term promise over you is no shame. This moment feels huge now; it won't define you.",pray:"God, this is so embarrassing. Thank you that shame doesn't get the last word over me."},
  {ref:"Romans 10:11",text:"For the Scripture says, “Everyone who believes in him will not be put to shame.”",why:"Belonging to Jesus comes with this guarantee: in the end, you will not be put to shame.",pray:"Jesus, I believe in you — help me stand on your promise instead of replaying this moment."},
  {ref:"Hebrews 12:2",text:"...looking to Jesus, the founder and perfecter of our faith, who for the joy that was set before him endured the cross, despising the shame, and is seated at the right hand of the throne of God.",why:"Jesus faced the most public humiliation in history and treated shame as beneath him. Look at him, not at the crowd.",pray:"Jesus, you know embarrassment worse than I ever will. Help me look to you."}],
 stories:[
  {title:"The woman at the well",hook:"She came to draw water at noon, alone, avoiding everyone who knew her story. Jesus knew it all — and offered her living water anyway.",ref:"John 4:1-30"}]},
 {id:"notgoodenough",name:"Not good enough",passages:[
  {ref:"Ephesians 2:8-10",text:"For by grace you have been saved through faith. And this is not your own doing; it is the gift of God... For we are his workmanship, created in Christ Jesus for good works, which God prepared beforehand, that we should walk in them.",why:"You don't have to earn your place — it's a gift. And you're called his workmanship: God's own handcrafted work.",pray:"God, thank you that I don't have to be good enough — your grace is a gift, and I'm your workmanship."},
  {ref:"2 Corinthians 12:9",text:"But he said to me, “My grace is sufficient for you, for my power is made perfect in weakness.”",why:"The places where you feel most inadequate are where God's power works best. Weakness is his workshop.",pray:"Lord, take my not-enough and show your more-than-enough."},
  {ref:"Psalm 139:14",text:"I praise you, for I am fearfully and wonderfully made. Wonderful are your works; my soul knows it very well.",why:"You are one of God's works, and his works are wonderful. That includes you — no exceptions clause.",pray:"God, help my soul truly know that I am fearfully and wonderfully made."}],
 stories:[
  {title:"Gideon, the least likely hero",hook:"Gideon told God his clan was the weakest and he was the least in his family. God's answer: “But I will be with you.” That was enough.",ref:"Judges 6:11-16"}]}
]},
{id:"confused",name:"Confused",tint:"#94A06B",emoji:"😕",icon:"path",subs:[
 {id:"decision",name:"Big decision to make",passages:[
  {ref:"James 1:5",text:"If any of you lacks wisdom, let him ask God, who gives generously to all without reproach, and it will be given him.",why:"Wisdom is free for the asking, and God won't roll his eyes at you for needing it. Just ask.",pray:"God, I need wisdom for this decision. You promised to give it generously — I'm asking."},
  {ref:"Proverbs 3:5-6",text:"Trust in the LORD with all your heart, and do not lean on your own understanding. In all your ways acknowledge him, and he will make straight your paths.",why:"You don't have to figure it all out alone. Bring God into the decision, and he straightens the road.",pray:"Lord, I trust you with this more than my own reasoning. Make my path straight."},
  {ref:"Psalm 32:8",text:"I will instruct you and teach you in the way you should go; I will counsel you with my eye upon you.",why:"God personally promises to coach you through this — instructing, teaching, watching over you the whole way.",pray:"Father, instruct me and teach me the way I should go. I'm listening."}],
 stories:[
  {title:"Solomon asks for one thing",hook:"God offered young King Solomon anything he wanted. Feeling in over his head, Solomon asked for wisdom — and God was delighted to give it.",ref:"1 Kings 3:5-14"}]},
 {id:"doubts",name:"Questions about God",passages:[
  {ref:"Mark 9:24",text:"Immediately the father of the child cried out and said, “I believe; help my unbelief!”",why:"This might be the most honest prayer in the Bible — and Jesus answered it. You can bring him faith and doubt in the same sentence.",pray:"Jesus, I believe — help my unbelief."},
  {ref:"Jeremiah 29:13",text:"You will seek me and find me, when you seek me with all your heart.",why:"Honest questions aren't a dead end. God promises that real seeking ends in real finding.",pray:"God, I'm seeking you with my questions. Let me find you."},
  {ref:"Psalm 34:8",text:"Oh, taste and see that the LORD is good! Blessed is the man who takes refuge in him!",why:"God invites you to test him with your own experience — taste and see. Faith gets stronger by trying it.",pray:"Lord, help me taste and see for myself that you are good."}],
 stories:[
  {title:"Thomas gets his proof",hook:"Thomas said he wouldn't believe unless he touched the scars himself. Jesus didn't shame him — he showed up and offered his hands.",ref:"John 20:24-29"}]},
 {id:"why",name:"Why did this happen?",passages:[
  {ref:"Isaiah 55:8-9",text:"For my thoughts are not your thoughts, neither are your ways my ways, declares the LORD. For as the heavens are higher than the earth, so are my ways higher than your ways and my thoughts than your thoughts.",why:"Some things won't make sense from where you're standing. God's view is higher — and he can be trusted with what you can't see.",pray:"God, I don't understand this. Help me trust your higher ways."},
  {ref:"Genesis 50:20",text:"As for you, you meant evil against me, but God meant it for good, to bring it about that many people should be kept alive, as they are today.",why:"Joseph could only say this looking back. What was meant for evil, God had been quietly turning to good the whole time.",pray:"Lord, even in what was meant for harm, work your good."},
  {ref:"Psalm 46:1-2",text:"God is our refuge and strength, a very present help in trouble. Therefore we will not fear though the earth gives way...",why:"You may not get the why. But you always get the Who — a very present help in this exact trouble.",pray:"God, I have questions with no answers. Be my refuge while I wait."}],
 stories:[
  {title:"Job asks God why",hook:"Job lost everything and demanded answers. God never explained why — instead he showed Job who he was, and somehow that was enough.",ref:"Job 1-2 & 38-42"}]},
 {id:"lost",name:"Lost, no direction",passages:[
  {ref:"Psalm 119:105",text:"Your word is a lamp to my feet and a light to my path.",why:"A lamp shows the next step — not the whole road. God's word gives enough light for today's step.",pray:"God, light up just my next step. I'll take the road one lamp-length at a time."},
  {ref:"Psalm 25:4-5",text:"Make me to know your ways, O LORD; teach me your paths. Lead me in your truth and teach me, for you are the God of my salvation; for you I wait all the day long.",why:"Feeling directionless is a good time to pray David's prayer: teach me, lead me, and I'll wait for you.",pray:"Lord, make me to know your ways. Lead me in your truth — I'm waiting on you."},
  {ref:"Isaiah 30:21",text:"And your ears shall hear a word behind you, saying, “This is the way, walk in it,” when you turn to the right or when you turn to the left.",why:"God promises guidance that arrives when you need it — a voice saying this is the way at the fork in the road.",pray:"Father, when I reach the next fork, let me hear you: “This is the way.”"}],
 stories:[
  {title:"Led by cloud and fire",hook:"Israel wandered a trackless desert, but they were never actually lost — God went ahead of them in a pillar of cloud by day and fire by night.",ref:"Exodus 13:17-22"}]}
]},
{id:"overwhelmed",name:"Overwhelmed",tint:"#8B8F9A",emoji:"😩",icon:"layers",subs:[
 {id:"toomuch",name:"Too much to do",passages:[
  {ref:"Matthew 11:28-30",text:"Come to me, all who labor and are heavy laden, and I will give you rest. Take my yoke upon you, and learn from me, for I am gentle and lowly in heart, and you will find rest for your souls.",why:"Jesus' invitation is addressed to exactly you: the overloaded. Bring him the whole pile and trade it for rest.",pray:"Jesus, I'm carrying too much. I'm coming to you for the rest you promised."},
  {ref:"Psalm 55:22",text:"Cast your burden on the LORD, and he will sustain you; he will never permit the righteous to be moved.",why:"Cast means throw — not politely hand over. Throw the load onto God and let him hold you steady.",pray:"Lord, I'm throwing this whole burden onto you. Sustain me."},
  {ref:"Matthew 6:33",text:"But seek first the kingdom of God and his righteousness, and all these things will be added to you.",why:"When everything demands to be first, Jesus simplifies the list: put God at the top and trust him with the rest.",pray:"God, help me put you first today and trust you to handle my list."}],
 stories:[
  {title:"Moses learns to share the load",hook:"Moses was judging every single dispute himself, morning to night, until his father-in-law told him the truth: “What you are doing is not good.” Even Moses needed help.",ref:"Exodus 18:13-24"}]},
 {id:"exhausted",name:"Exhausted",passages:[
  {ref:"Isaiah 40:28-31",text:"He gives power to the faint, and to him who has no might he increases strength... they who wait for the LORD shall renew their strength; they shall mount up with wings like eagles; they shall run and not be weary; they shall walk and not faint.",why:"God never runs out of energy, and he gives it away to tired people who wait on him.",pray:"God, I'm faint. Renew my strength the way you promised."},
  {ref:"Exodus 33:14",text:"And he said, “My presence will go with you, and I will give you rest.”",why:"God's answer to a worn-out Moses is his answer to you: my presence, and rest.",pray:"Lord, go with me — and give me real rest."},
  {ref:"Psalm 4:8",text:"In peace I will both lie down and sleep; for you alone, O LORD, make me dwell in safety.",why:"A verse to pray at bedtime. You can actually sleep, because God stays on watch.",pray:"Father, I'm lying down now. Keep watch so I can truly rest."}],
 stories:[
  {title:"God feeds a burned-out prophet",hook:"Elijah was so exhausted he wanted to quit everything. God's first response wasn't a lecture — it was a nap and two hot meals, delivered by an angel.",ref:"1 Kings 19:3-8"}]},
 {id:"pressure",name:"Under pressure",passages:[
  {ref:"Psalm 61:2",text:"From the end of the earth I call to you when my heart is faint. Lead me to the rock that is higher than I.",why:"When the pressure is over your head, you need higher ground. God is the rock that's higher than you.",pray:"God, my heart is faint. Lead me to the rock that is higher than I."},
  {ref:"Isaiah 26:3",text:"You keep him in perfect peace whose mind is stayed on you, because he trusts in you.",why:"Peace under pressure has a formula here: a mind fixed on God stays held in perfect peace.",pray:"Lord, keep my mind stayed on you, and keep me in your peace."},
  {ref:"John 16:33",text:"I have said these things to you, that in me you may have peace. In the world you will have tribulation. But take heart; I have overcome the world.",why:"Jesus promises two things: pressure will come, and he's already beaten it. Take heart.",pray:"Jesus, this world is pressing hard — but you've overcome it. Help me take heart."}],
 stories:[
  {title:"Three friends and a furnace",hook:"Shadrach, Meshach, and Abednego faced the ultimate pressure: bow or burn. They stood firm — and found a fourth figure walking with them in the fire.",ref:"Daniel 3:8-30"}]},
 {id:"giveup",name:"Want to give up",passages:[
  {ref:"Galatians 6:9",text:"And let us not grow weary of doing good, for in due season we will reap, if we do not give up.",why:"The harvest is promised — the only variable is not quitting before it comes. Keep going.",pray:"God, I'm weary of trying. Help me not give up before the harvest."},
  {ref:"2 Corinthians 4:16-17",text:"So we do not lose heart. Though our outer self is wasting away, our inner self is being renewed day by day. For this light momentary affliction is preparing for us an eternal weight of glory beyond all comparison.",why:"What feels crushing now is producing something in you that will outweigh it forever.",pray:"Father, renew my inner self today. Help me see past this to the glory you're preparing."},
  {ref:"Hebrews 12:1-2",text:"...let us run with endurance the race that is set before us, looking to Jesus, the founder and perfecter of our faith...",why:"You're mid-race, surrounded by witnesses cheering you on. Fix your eyes on Jesus at the finish line and keep running.",pray:"Jesus, I'm tired of running. Fix my eyes on you and carry me to the finish."}],
 stories:[
  {title:"Singing at midnight in prison",hook:"Beaten and locked in a dungeon, Paul and Silas had every reason to quit. Instead they sang — and God shook the prison open.",ref:"Acts 16:16-34"}]}
]}
];

// ============ STORAGE (safe wrapper) ============
const mem = {};
const S = {
  get(k, fallback){ try{ const v = localStorage.getItem(k); return v===null ? fallback : JSON.parse(v); }catch(e){ return k in mem ? mem[k] : fallback; } },
  set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} mem[k]=v; }
};

 flame:'<path d="M12 3s5.5 4.6 5.5 10a5.5 5.5 0 1 1-11 0c0-2.2 1-4 2.2-5.6.3 1.3 1 2.3 2 2.8C10.5 8 11 5.5 12 3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>',
 sun:'<circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 3v2.4M12 18.6V21M3 12h2.4M18.6 12H21M5.6 5.6l1.7 1.7M16.7 16.7l1.7 1.7M18.4 5.6l-1.7 1.7M7.3 16.7l-1.7 1.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',

};
function svg(name){ return '<svg viewBox="0 0 24 24" aria-hidden="true">'+ICONS[name]+'</svg>'; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ============ WEEKLY MEMORY VERSE ============
function isoWeekKey(d){
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const y = d.getUTCFullYear();
  const week = Math.ceil((((d - Date.UTC(y,0,1)) / 86400000) + 1) / 7);
  return y + '-W' + String(week).padStart(2,'0');
}
function prevWeekKey(){ const d = new Date(); d.setDate(d.getDate()-7); return isoWeekKey(d); }
function trackVisit(emotionId){
  const wk = isoWeekKey(new Date());
  const visits = S.get('visits', {});
  if(!visits[wk]) visits[wk] = {};
  visits[wk][emotionId] = (visits[wk][emotionId]||0)+1;
  // keep only last 4 weeks
  const keys = Object.keys(visits).sort();
  while(keys.length > 4){ delete visits[keys.shift()]; }
  S.set('visits', visits);
}
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function getWeeklyVerse(){
  const wk = isoWeekKey(new Date());
  let cur = S.get('memverse', null);
  if(cur && cur.week === wk) return cur;
  const visits = S.get('visits', {});
  const counts = visits[prevWeekKey()] || visits[wk] || {};
  let topEmotion = null, top = 0;
  for(const [k,v] of Object.entries(counts)){ if(v > top){ top = v; topEmotion = k; } }
  const lastRef = cur ? cur.ref : '';
  let pool, source;
  if(topEmotion && MEMORY_POOLS[topEmotion]){
    pool = MEMORY_POOLS[topEmotion];
    source = DATA.find(e=>e.id===topEmotion).name.toLowerCase();
  } else {
    pool = MEMORY_GENERAL; source = null;
  }
  let pick = pool[hashStr(wk) % pool.length];
  if(pick.ref === lastRef && pool.length > 1) pick = pool[(hashStr(wk)+1) % pool.length];
  cur = { week: wk, ref: pick.ref, text: pick.text, source };
  S.set('memverse', cur);
  return cur;
}
function practiceText(text, mode){
  const words = text.split(' ');
  return words.map((w,i)=>{
    const strip = w.replace(/[^A-Za-z']/g,'');
    if(!strip) return w;
    const blank = (mode===1 && i%2===1) || mode===2;
    if(!blank) return esc(w);
    const first = mode===2 ? strip[0] : '';
    return '<span style="color:#B9C4BD">'+first+'_'.repeat(Math.max(2, strip.length - first.length))+'</span>';
  }).join(' ');
}

// ============ STATE & ROUTER ============
let state = { screen:'home', emotionId:null, subId:null, practice:0 };
function go(s){ Object.assign(state, s); render(); window.scrollTo(0,0); }
function currentEmotion(){ return DATA.find(e=>e.id===state.emotionId); }
function currentSub(){ const e = currentEmotion(); return e ? e.subs.find(s=>s.id===state.subId) : null; }
function setTint(hex){ document.documentElement.style.setProperty('--tint', hex || '#7E9B8C'); }

// ============ FAVORITES ============
function favId(eId, sId, ref){ return eId+'|'+sId+'|'+ref; }
function isFav(id){ return S.get('favs', []).includes(id); }
function toggleFav(id){
  let f = S.get('favs', []);
  f = f.includes(id) ? f.filter(x=>x!==id) : [...f, id];
  S.set('favs', f); render();
}
function findPassage(id){
  const [eId, sId, ref] = id.split('|');
  const e = DATA.find(x=>x.id===eId); if(!e) return null;
  const s = e.subs.find(x=>x.id===sId); if(!s) return null;
  const p = s.passages.find(x=>x.ref===ref); if(!p) return null;
  return { ...p, emotion:e, sub:s };
}

// ============ RENDER ============
const app = document.getElementById('app');

function setMemVerse(ref, text){
  const wk = isoWeekKey(new Date());
  S.set('memverse', { week: wk, ref, text, source: 'chosen' });
  render(); window.scrollTo(0,0);
}
function passageCard(p, eId, sId){
  const id = favId(eId, sId, p.ref);
  const on = isFav(id);
  const mv = S.get('memverse', null);
  const isMem = mv && mv.ref === p.ref;
  let memBtn = '';
  if(on){
    memBtn = isMem
      ? '<div style="margin-top:12px"><span class="chip" style="cursor:default;color:var(--gold);border-color:var(--gold)">\u2713 This week\u2019s memory verse</span></div>'
      : '<div style="margin-top:12px"><button class="chip" onclick="setMemVerse(\''+p.ref.replace(/'/g,"\\'")+'\', this.dataset.t)" data-t="'+esc(p.text)+'">\u2606 Make this my memory verse</button></div>';
  }
  return '<div class="pcard">'
    + '<div class="vtext">'+esc(p.text)+'</div>'
    + '<div class="vref"><span>— '+esc(p.ref)+' (ESV)</span>'
    + '<button class="fav'+(on?' on':'')+'" aria-label="'+(on?'Remove from favorites':'Save to favorites')+'" onclick="toggleFav(\''+id+'\')">'+(on?'★':'☆')+'</button></div>'
    + '<div class="why"><b>Why this verse</b>'+esc(p.why)+'</div>'
    + '<div class="pray"><b>Pray it</b>'+esc(p.pray)+'</div>'
    + memBtn
    + '</div>';
}

function renderHome(){
  setTint(null);
  const v = getWeeklyVerse();
  const modes = ['Full verse','Hide some','Hide all'];
  let html = '<div class="top"><div><h1>At All Times</h1>'
    + '<div class="sub serif" style="margin-top:6px;font-style:italic;line-height:1.5">\u201cTrust in him at all times...\u201d \u2014 Psalm 62:8</div>'
    + '</div></div>';
  html += '<div class="mem"><div class="label">This week\u2019s memory verse'
    + (v.source === 'chosen' ? ' \u00b7 your pick' : (v.source ? ' \u00b7 for when you\u2019ve felt '+esc(v.source) : ''))
    + '</div>'
    + '<div class="vtext">'+practiceText(v.text, state.practice)+'</div>'
    + '<div class="vref">— '+esc(v.ref)+' (ESV)</div>'
    + '<div class="tools">'
    + modes.map((m,i)=>'<button class="chip'+(state.practice===i?' active':'')+'" onclick="go({practice:'+i+'})">'+m+'</button>').join('')
    + '</div>'
    + '<div class="hint">Try to say it from memory a little each day this week.</div></div>';
  html += '<div class="sechead" style="margin-top:6px">How are you feeling?</div>';
  html += '<div class="grid" style="margin-top:10px">' + DATA.map(e =>
    '<button class="etile" onclick="openEmotion(\''+e.id+'\')">'
    + '<span class="dot" style="background:'+e.tint+'1E"><span class="emo">'+e.emoji+'</span></span>'
    + '<span class="name">'+e.name+'</span>'
    + '<span class="count">'+e.subs.length+' feelings</span>'
    + '</button>').join('') + '</div>';
  html += footer();
  app.innerHTML = html;
}
function openEmotion(id){ trackVisit(id); go({screen:'subs', emotionId:id}); }

function renderSubs(){
  const e = currentEmotion(); setTint(e.tint);
  let html = '<div class="top"><button class="back" onclick="go({screen:\'home\'})" aria-label="Back">\u2190</button>'
    + '<div><div class="crumb">I\u2019m feeling</div><div class="page-title">'+e.name+'</div></div></div>';
  html += '<div class="sublist">' + e.subs.map(s =>
    '<button class="subbtn" onclick="go({screen:\'passages\', subId:\''+s.id+'\'})">'
    + '<span>'+esc(s.name)+'</span><span class="arrow">\u2192</span></button>').join('') + '</div>';
  html += footer();
  app.innerHTML = html;
}

function renderPassages(){
  const e = currentEmotion(), s = currentSub(); setTint(e.tint);
  let html = '<div class="top"><button class="back" onclick="go({screen:\'subs\'})" aria-label="Back">\u2190</button>'
    + '<div><div class="crumb">'+e.name+'</div><div class="page-title">'+esc(s.name)+'</div></div></div>';
  html += s.passages.map(p => passageCard(p, e.id, s.id)).join('');
  if(s.stories && s.stories.length){
    html += '<div class="sechead">Go read this in your Bible</div>';
    html += s.stories.map(st =>
      '<div class="story"><div class="stitle">'+esc(st.title)+'</div>'
      + '<div class="hook">'+esc(st.hook)+'</div>'
      + '<span class="readit">\u{1F4D6} Read it: '+esc(st.ref)+'</span></div>').join('');
  }
  html += footer();
  app.innerHTML = html;
}

function renderFavorites(){
  setTint(null);
  let html = '<div class="top"><div><h1>Saved verses</h1><div class="sub">Verses you\u2019ve starred</div></div></div>';
  const favs = S.get('favs', []).map(findPassage).filter(Boolean);
  if(!favs.length){
    html += '<div class="empty"><div class="big">Nothing saved yet</div>Tap the \u2606 on any verse to keep it here.</div>';
  } else {
    html += favs.map(p => passageCard(p, p.emotion.id, p.sub.id)).join('');
  }
  html += footer();
  app.innerHTML = html;
}

function renderJournal(){
  setTint(null);
  let html = '<div class="top"><div><h1>Journal</h1><div class="sub">A quiet place to write what you\u2019re feeling</div></div></div>';
  html += '<textarea id="jtext" placeholder="What\u2019s on your heart today?"></textarea>'
    + '<button class="btn" onclick="addEntry()">Save entry</button>';
  const entries = S.get('journal', []);
  if(entries.length){
    html += entries.map((en,i) =>
      '<div class="jentry"><div class="jdate"><span>'+esc(en.date)+'</span>'
      + '<button class="jdel" onclick="delEntry('+i+')">Delete</button></div>'
      + '<div class="jtext">'+esc(en.text)+'</div></div>').join('');
  } else {
    html += '<div class="empty">Your entries stay on this phone — just between you and God.</div>';
  }
  html += footer();
  app.innerHTML = html;
}
function addEntry(){
  const t = document.getElementById('jtext').value.trim();
  if(!t) return;
  const entries = S.get('journal', []);
  const d = new Date();
  const date = d.toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
  entries.unshift({date, text:t});
  S.set('journal', entries); render();
}
function delEntry(i){
  const entries = S.get('journal', []);
  entries.splice(i,1); S.set('journal', entries); render();
}

function footer(){
  return '<footer>Scripture quotations are from the ESV\u00ae Bible (The Holy Bible, English Standard Version\u00ae), \u00a9 2001 by Crossway. Used by permission. All rights reserved.</footer>';
}

function renderNav(){
  const tabs = [
    {id:'home', label:'Verses', icon:'book', screens:['home','subs','passages']},
    {id:'favorites', label:'Saved', icon:'star', screens:['favorites']},
    {id:'journal', label:'Journal', icon:'pen', screens:['journal']}
  ];
  document.getElementById('nav').innerHTML = tabs.map(t =>
    '<button class="'+(t.screens.includes(state.screen)?'active':'')+'" onclick="go({screen:\''+t.id+'\'})">'
    + svg(t.icon) + t.label + '</button>').join('');
}

function render(){
  if(state.screen==='home') renderHome();
  else if(state.screen==='subs') renderSubs();
  else if(state.screen==='passages') renderPassages();
  else if(state.screen==='favorites') renderFavorites();
  else if(state.screen==='journal') renderJournal();
  renderNav();
}
render();

// ============ PWA ============
if('serviceWorker' in navigator){
  try{ navigator.serviceWorker.register('sw.js'); }catch(e){}
}
</script>
