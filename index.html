  {ref:"2 Peter 3:18",text:"But grow in the grace and knowledge of our Lord and Savior Jesus Christ.",why:"Growth isn’t just for sports and school — grace and knowledge of Jesus are meant to keep growing too.",pray:"Jesus, as I get better at other things, help me grow in knowing you most of all."}],
 stories:[
  {title:"The boy who grew up in God’s house",hook:"Samuel started as a little kid serving in the temple, and “continued to grow both in stature and in favor with the LORD and also with man” — until all Israel knew God was with him.",ref:"1 Samuel 2:26 & 3"}]},
 {id:"standing",name:"Standing up for what’s right",passages:[
  {ref:"Joshua 24:15",text:"...choose this day whom you will serve... But as for me and my house, we will serve the LORD.",why:"Joshua planted a flag in front of everyone. Confidence sometimes looks like declaring your side out loud.",pray:"God, give me Joshua’s boldness: as for me, I will serve the LORD."},
  {ref:"1 Corinthians 16:13",text:"Be watchful, stand firm in the faith, act like men, be strong.",why:"Four commands, no apologies. Standing for what’s right takes alertness, firmness, maturity, and strength — God supplies all four.",pray:"Lord, make me watchful, firm, mature, and strong when it’s time to stand."},
  {ref:"Daniel 1:8",text:"But Daniel resolved that he would not defile himself...",why:"Daniel decided in advance where his line was — before the pressure came. Resolve ahead of time and standing firm gets easier.",pray:"God, help me decide where I stand before the moment tests me."}],
 stories:[
  {title:"“We cannot stop speaking”",hook:"Peter and John — “uneducated, common men” — stood before the most powerful council in the land and refused to stay quiet about Jesus. The council was astonished at their boldness.",ref:"Acts 4:13-20"}]},
 {id:"newthing",name:"Trying something new",passages:[
  {ref:"Proverbs 3:26",text:"...for the LORD will be your confidence and will keep your foot from being caught.",why:"Real confidence isn’t self-confidence — it’s God-confidence. He steadies your feet on unfamiliar ground.",pray:"Lord, be my confidence as I try this new thing. Keep my feet steady."},
  {ref:"Isaiah 43:19",text:"Behold, I am doing a new thing; now it springs forth, do you not perceive it? I will make a way in the wilderness and rivers in the desert.",why:"God loves new things — he specializes in making ways where there weren’t any. Your new venture is his kind of territory.",pray:"God, you make rivers in deserts. Make a way in this new thing I’m starting."},
  {ref:"Ecclesiastes 11:4",text:"He who observes the wind will not sow, and he who regards the clouds will not reap.",why:"Wait for perfect conditions and you’ll wait forever. At some point, faith plants the seed.",pray:"Father, help me stop watching the clouds and just plant the seed."}],
 stories:[
  {title:"The cupbearer asks the king",hook:"Nehemiah had a safe job and a scary idea: ask the most powerful man alive for permission to rebuild Jerusalem. He prayed a quick silent prayer, opened his mouth — and the king said yes.",ref:"Nehemiah 2:1-8"}]}
]}
];

const READS = [
{id:"pr1",cat:"prayerlife",title:"Prayer Isn\u2019t a Performance",min:2,body:[
"Two guys walk into the temple to pray. One delivers a polished speech about how impressive he is. The other can\u2019t even look up \u2014 he just says, \u201cGod, be merciful to me, a sinner.\u201d Jesus said the second guy went home right with God. The one with the worst prayer won.",
"That should change everything about how you pray. God isn\u2019t grading your vocabulary. He\u2019s not comparing you to your pastor or checking whether you said it right. Jesus actually warned against \u201cheaping up empty phrases\u201d \u2014 fancy words for the sake of fancy words. Your Father, he said, already knows what you need before you ask.",
"So why pray at all, if he already knows? Because prayer was never an information transfer. It\u2019s a relationship. When you tell a friend about your day, it\u2019s not because they need a report \u2014 it\u2019s because sharing life is what friendship is. God wants that with you. Messy sentences, half-finished thoughts, honest frustration \u2014 all of it counts.",
"The best prayer you can pray today is the true one. Not the impressive one."],
verse:{ref:"Matthew 6:8",text:"...your Father knows what you need before you ask him."},
q:"If you dropped every \u201cchurchy\u201d word from your prayers, what would you actually say to God right now?",
pray:"Try it before you close this: one minute, no fancy words. Just tell God the truest thing about your day."},
{id:"pr2",cat:"prayerlife",title:"What Do I Even Say?",min:2,body:[
"Staring at the ceiling, wanting to pray, not knowing where to start \u2014 everybody\u2019s been there. Here\u2019s the secret: there\u2019s no wrong door into a conversation with God. But if you want a simple path, try four moves.",
"Thank him for something \u2014 anything. Today\u2019s win, this morning\u2019s breakfast, the friend who made you laugh. Gratitude warms up the conversation. Then be honest about what\u2019s hard \u2014 the worry, the grade, the person. Paul said to bring requests to God \u201cin everything,\u201d which means nothing is too small or too weird. Then ask for what you need \u2014 directly. God likes being asked. And finally, listen \u2014 sit quiet for thirty seconds. Prayer has two directions.",
"Some days you\u2019ll pray paragraphs. Other days it\u2019s \u201cGod, help.\u201d Both are real prayers. David wrote long, beautiful psalms and also cried out one-liners while running for his life. The Bible kept both kinds, because God receives both kinds.",
"You don\u2019t need to know what to say. You just need to show up and start."],
verse:{ref:"Philippians 4:6",text:"Do not be anxious about anything, but in everything by prayer and supplication with thanksgiving let your requests be made known to God."},
q:"Which of the four moves \u2014 thanking, being honest, asking, listening \u2014 do you skip most often?",
pray:"Run the four moves right now: one thank-you, one honest thing, one ask, thirty seconds of quiet."},
{id:"pr3",cat:"prayerlife",title:"When God Feels Quiet",min:2,body:[
"Sometimes you pray and it feels like the ceiling is made of concrete. You ask, and nothing seems to change. If you\u2019ve felt that, you\u2019re in good company \u2014 David opened Psalm 13 with \u201cHow long, O LORD? Will you forget me forever?\u201d That\u2019s in the Bible. God kept it there on purpose.",
"Here\u2019s what\u2019s worth knowing: silence is not absence. Some of God\u2019s biggest work happens in seasons where he seems quietest. Joseph spent years in a prison cell that looked like God had lost his address \u2014 while God was positioning him to save nations. You can\u2019t always see what he\u2019s building from inside the waiting.",
"And notice what David did with his frustration: he told God about it. He didn\u2019t quit praying because prayer felt hard \u2014 he made the hardness the prayer. By the end of that same psalm, something shifted: \u201cBut I have trusted in your steadfast love.\u201d The circumstances hadn\u2019t changed yet. David had.",
"Keep showing up. Quiet seasons end, and the people who kept talking to God through them come out knowing him deeper."],
verse:{ref:"Psalm 13:1",text:"How long, O LORD? Will you forget me forever? How long will you hide your face from me?"},
q:"What have you stopped praying about because it felt like nothing was happening?",
pray:"Tell God honestly how the silence feels \u2014 David did. Then end the way he did: \u201cBut I trust your steadfast love.\u201d"},
{id:"fs1",cat:"faithschool",title:"Faith in First Period",min:2,body:[
"Jesus said you\u2019re the light of the world \u2014 and then added something practical: nobody lights a lamp and hides it under a basket. The question for a student isn\u2019t whether to bring your faith to school. It came with you. The question is whether it\u2019s under a basket.",
"Here\u2019s the good news: shining doesn\u2019t mean preaching in the cafeteria. Jesus said people would see your good works \u2014 not hear your good speeches \u2014 and give glory to God. Light at school looks like being the person who doesn\u2019t pile on when someone\u2019s getting roasted. Telling the truth when a lie is easier. Sitting with the kid who\u2019s alone. Working hard on the group project when everyone else coasts.",
"That kind of different gets noticed. Not always celebrated \u2014 sometimes questioned, occasionally mocked. But noticed. And over a school year, quiet consistency preaches louder than any lunchroom sermon could.",
"You don\u2019t have to be the loudest Christian in the building. Just be the realest one."],
verse:{ref:"Matthew 5:16",text:"In the same way, let your light shine before others, so that they may see your good works and give glory to your Father who is in heaven."},
q:"What\u2019s one specific place at school where your light is currently under a basket?",
pray:"Ask God to show you one person at school tomorrow who needs your kind of light \u2014 then ask for the courage to shine it."},
{id:"fs2",cat:"faithschool",title:"The Pressure Is Real",min:2,body:[
"Grades, tryouts, college talk, comparison \u2014 school can feel like a pressure cooker where your whole future rides on every quiz. Take a breath. God\u2019s word has a different frame for your work.",
"Paul wrote, \u201cWhatever you do, work heartily, as for the Lord and not for men.\u201d Read that slowly: your real audience isn\u2019t the teacher, the scholarship committee, or the parents in the bleachers. It\u2019s the Lord. That changes two things. First, it means excellence matters \u2014 half-effort isn\u2019t how you work for a King. But second, it means your worth was never on the scoreboard. You work from acceptance, not for it.",
"Do the studying. Give the effort. Then hand God the outcome \u2014 because after you\u2019ve done your part, the results were never fully in your hands anyway. Jesus asked a question worth memorizing for test week: which of you by being anxious can add a single hour to his life? Worry adds nothing. Prayer, sleep, and honest effort add plenty.",
"Work hard. Trust harder."],
verse:{ref:"Colossians 3:23",text:"Whatever you do, work heartily, as for the Lord and not for men."},
q:"Are you working from acceptance or for it \u2014 and how can you tell the difference in your stress level?",
pray:"Before your next big assignment or game, pray this: \u201cLord, this effort is for you. The outcome is yours too.\u201d"},
{id:"fs3",cat:"faithschool",title:"\u201cWait, You Believe That?\u201d",min:2,body:[
"Sooner or later it happens: someone finds out you\u2019re a Christian and asks why. Maybe curious, maybe testing you. Your mind goes blank. What now?",
"Peter \u2014 who once denied Jesus three times when the pressure was on \u2014 later wrote the game plan: \u201cAlways be prepared to make a defense to anyone who asks you for a reason for the hope that is in you; yet do it with gentleness and respect.\u201d Notice what he didn\u2019t say: win the argument. Have a PhD answer. Convince them on the spot. Just be ready to explain your hope \u2014 gently.",
"And here\u2019s what disarms almost everyone: your story. You don\u2019t need to solve every philosophy question to say \u201chere\u2019s what God has done in my life, and here\u2019s why I trust him.\u201d Nobody can argue with your story. If they ask something you can\u2019t answer, \u201cthat\u2019s a great question \u2014 let me think about it\u201d is a faithful response, not a failure.",
"The pressure\u2019s off. You\u2019re a witness, not the lawyer. God handles the verdict."],
verse:{ref:"1 Peter 3:15",text:"...always being prepared to make a defense to anyone who asks you for a reason for the hope that is in you; yet do it with gentleness and respect."},
q:"If a friend asked you tomorrow why you believe, what one true sentence would you want to say?",
pray:"Ask God to prepare you \u2014 not with a script, but with hope so real it\u2019s easy to talk about. And pray for the friend who might ask."},
{id:"fr1",cat:"friends",title:"The Group Chat Went Bad",min:2,body:[
"It starts as jokes. Then someone\u2019s not in the chat, and the jokes are about them. Screenshots fly. And you\u2019re sitting there with your thumb hovering, deciding who you\u2019re going to be.",
"Paul\u2019s rule for words fits texting like it was written for it: \u201cLet no corrupting talk come out of your mouths, but only such as is good for building up.\u201d Two categories. Every message either corrupts or builds \u2014 tears at somebody or adds something good. There\u2019s no neutral pile-on.",
"Here\u2019s the hard part: silence in the group chat feels safe, but Scripture calls gossip a fire, and standing by while a friend gets burned isn\u2019t peacemaking. You don\u2019t have to deliver a lecture. \u201cNah, they\u2019re actually cool\u201d or just changing the subject can redirect a whole conversation. One person going a different way gives everyone else permission to follow.",
"And when in doubt, run the test: would you send it if the person could see it? Because the God who loves both of you already can."],
verse:{ref:"Ephesians 4:29",text:"Let no corrupting talk come out of your mouths, but only such as is good for building up, as fits the occasion, that it may give grace to those who hear."},
q:"Is there a chat or conversation where you\u2019ve been quietly going along with tearing someone down?",
pray:"Ask God to make you quick to notice the moment a conversation turns \u2014 and brave enough to turn it back."},
{id:"fr2",cat:"friends",title:"Choosing Your People",min:2,body:[
"\u201cBad company ruins good morals.\u201d Paul wrote that to adults, but every student knows it\u2019s a hallway truth. Who you walk with shapes who you become \u2014 slowly, invisibly, and more powerfully than you think.",
"Proverbs puts it positively: \u201cWhoever walks with the wise becomes wise.\u201d Friendship is direction, not just company. Your closest friends are quietly setting your defaults \u2014 how you talk, what you laugh at, what you think is normal, what you chase. So it\u2019s worth asking honestly: where are your people headed? Because you\u2019re headed there too.",
"This isn\u2019t about only befriending church kids or dropping anyone who struggles \u2014 Jesus was famously good to people the religious crowd avoided. It\u2019s about your inner circle: the two or three voices with real access to your heart. Those seats matter. Fill them with people who make you braver, kinder, and closer to God \u2014 and be that person for them.",
"You can be friendly with everyone. You can\u2019t be shaped by everyone. Choose the shapers."],
verse:{ref:"Proverbs 13:20",text:"Whoever walks with the wise becomes wise, but the companion of fools will suffer harm."},
q:"Think of your three closest friends: what direction are they pulling you, honestly?",
pray:"Thank God for the friends who make you better \u2014 by name. Then ask him to help you be a direction-setter, not just a follower."},
{id:"fr3",cat:"friends",title:"When You\u2019re the One Who Messed Up",min:2,body:[
"Sometimes the drama is your fault. You said the thing, sent the text, told the secret. Now there\u2019s a wall between you and someone, and you built it. What does a person of faith do next?",
"Jesus gave a startling answer: he said if you\u2019re at the altar \u2014 mid-worship! \u2014 and remember someone has something against you, leave, go make it right, then come back. Reconciliation is so important to God that he\u2019ll wait while you go fix it. Apologizing isn\u2019t the interruption to your spiritual life. Sometimes it is your spiritual life.",
"A real apology has no \u201cbut\u201d in it. \u201cI\u2019m sorry, but you...\u201d isn\u2019t an apology; it\u2019s a rematch. Name what you did, own it fully, ask for forgiveness, and don\u2019t demand instant results \u2014 trust rebuilds on their timeline, not yours. Proverbs promises that whoever conceals their mess won\u2019t prosper, but the one who confesses finds mercy. That\u2019s true with God and usually true with people.",
"Eating pride tastes terrible for about ten minutes. Carrying guilt lasts a lot longer. Go make it right."],
verse:{ref:"Matthew 5:24",text:"...leave your gift there before the altar and go. First be reconciled to your brother, and then come and offer your gift."},
q:"Is there an apology you\u2019ve been avoiding \u2014 and what\u2019s really stopping you?",
pray:"Ask God for the humility to own your part with no \u201cbut\u201d \u2014 then ask him to soften the heart of the person you hurt."},
{id:"fa1",cat:"family",title:"Parents Aren\u2019t the Enemy",min:2,body:[
"\u201cHonor your father and mother\u201d is the first commandment with a promise attached \u2014 \u201cthat it may go well with you.\u201d God tied your good to how you treat your parents. That\u2019s worth sitting with, especially on the days they feel impossible.",
"Honoring doesn\u2019t mean agreeing with every rule or pretending they\u2019re perfect. It means treating them with respect even mid-disagreement \u2014 tone, eye rolls, and all. Here\u2019s a secret about parents: respectful disagreement actually gets heard. \u201cCan I explain how I see it?\u201d opens doors that slammed ones never will.",
"It helps to remember what you can\u2019t see yet: they\u2019re carrying things they\u2019ve never told you \u2014 work stress, money worries, their own fears about whether they\u2019re doing this right. Most parental \u201cno\u201ds are love wearing an annoying disguise. You won\u2019t fully believe that until you\u2019re older, which is exactly why God made it a commandment instead of a suggestion \u2014 he knew it wouldn\u2019t always feel true.",
"Honor them on the easy days and the hard ones. It goes well for people who do."],
verse:{ref:"Ephesians 6:2-3",text:"\u201cHonor your father and mother\u201d (this is the first commandment with a promise), \u201cthat it may go well with you and that you may live long in the land.\u201d"},
q:"What does \u201chonor\u201d need to look like in your house this week \u2014 specifically?",
pray:"Pray for your parents by name tonight \u2014 for what they\u2019re carrying that you can\u2019t see. It\u2019s hard to stay angry at someone you\u2019re praying for."},
{id:"fa2",cat:"family",title:"Sibling Wars",min:2,body:[
"Nobody can push your buttons like a sibling \u2014 they installed half of them. The Bible doesn\u2019t pretend family is easy; its very first brothers ended in tragedy, and Joseph\u2019s brothers sold him to slave traders. Scripture is realistic about sibling friction. It just refuses to leave you there.",
"Paul\u2019s words fit the bedroom-wall battles perfectly: \u201cIf possible, so far as it depends on you, live peaceably with all.\u201d Notice the honesty \u2014 \u201cif possible\u201d and \u201cso far as it depends on you.\u201d You can\u2019t control your brother or sister. You control your half: your comebacks, your retaliation, your willingness to let a jab slide. Proverbs says it\u2019s a person\u2019s glory to overlook an offense. In sibling terms: not every annoying thing deserves a war.",
"And here\u2019s the long view worth borrowing from every adult who has one: your sibling is the person who\u2019ll know your whole story longer than almost anyone alive. The relationship you\u2019re building \u2014 or burning \u2014 right now is the one you\u2019ll have at thirty.",
"Play the long game. Be the peacemaker in the hallway."],
verse:{ref:"Romans 12:18",text:"If possible, so far as it depends on you, live peaceably with all."},
q:"What\u2019s the recurring fight in your house \u2014 and what\u2019s the part of it that depends on you?",
pray:"Ask God to help you drop your half of the next fight \u2014 and thank him for one genuinely good thing about your sibling."},
{id:"fa3",cat:"family",title:"When Home Is Hard",min:2,body:[
"Some homes carry heavy things \u2014 arguing that doesn\u2019t stop, a parent who\u2019s absent or struggling, divorce, grief, or tension you can\u2019t name but can always feel. If that\u2019s your house, first hear this: none of it is a report card on you, and God is not far from it.",
"David wrote, \u201cFor my father and my mother have forsaken me, but the LORD will take me in.\u201d Scripture looks family pain straight in the eye. God repeatedly introduces himself as \u201cfather of the fatherless\u201d and defender of the vulnerable \u2014 he leans toward hurting homes, not away from them. Whatever is unstable around you, he isn\u2019t.",
"Two things you should do with a heavy home. Bring it to God nightly \u2014 honestly, angrily if needed; the Psalms prove he can take it. And bring it to a trusted adult too \u2014 a grandparent, counselor, youth leader, or teacher. Asking for help isn\u2019t betraying your family or your faith. God often answers prayers about hard homes through wise people.",
"You are seen, you are taken in, and you are not carrying this alone."],
verse:{ref:"Psalm 27:10",text:"For my father and my mother have forsaken me, but the LORD will take me in."},
q:"What\u2019s the heavy thing at home you\u2019ve never actually said out loud to God \u2014 or to anyone?",
pray:"Say it to God tonight, plainly. Then ask him to show you one trusted adult who should hear it too."},
{id:"hd1",cat:"harddays",title:"When You Can\u2019t Feel God",min:2,body:[
"Some mornings faith feels electric. Other mornings God feels about as real as a rumor. If your faith rides that rollercoaster, here\u2019s something that will steady you: feelings are real, but they aren\u2019t facts.",
"Jeremiah wrote Lamentations from the rubble of a destroyed city \u2014 arguably the worst day in his nation\u2019s history. And right in the middle of describing his misery, he pivots: \u201cThe steadfast love of the LORD never ceases; his mercies never come to an end; they are new every morning.\u201d He didn\u2019t feel that. He chose to call it to mind \u2014 his words \u2014 like a man reciting facts to himself in a storm.",
"That\u2019s the move: preach to your feelings instead of listening to them. God\u2019s love doesn\u2019t flicker when your emotions do. The sun doesn\u2019t stop existing on cloudy days; you just can\u2019t see it for a while. Keep praying on the numb days precisely because prayer doesn\u2019t depend on feeling it.",
"Faithfulness on the flat days is still faith \u2014 some would say it\u2019s faith at its strongest."],
verse:{ref:"Lamentations 3:22-23",text:"The steadfast love of the LORD never ceases; his mercies never come to an end; they are new every morning; great is your faithfulness."},
q:"What true thing about God do you need to \u201ccall to mind\u201d on the days you can\u2019t feel him?",
pray:"Pray even though it feels flat today \u2014 especially because it does. Tell God: \u201cI can\u2019t feel you right now, but I\u2019m choosing to trust that you\u2019re here.\u201d"},
{id:"hd2",cat:"harddays",title:"One Day at a Time",min:2,body:[
"Anxiety has a favorite trick: it makes you live every hard day of the next month all at once, today. The test next week, the conversation you\u2019re dreading, the what-ifs stacked to the ceiling \u2014 none of it has happened, and you\u2019re already exhausted by it.",
"Jesus\u2019 counsel sounds almost too simple: \u201cDo not be anxious about tomorrow, for tomorrow will be anxious for itself. Sufficient for the day is its own trouble.\u201d He\u2019s not being dismissive \u2014 he\u2019s being precise. God gives strength the way he gave Israel manna in the desert: today\u2019s portion, every morning, never a week\u2019s supply in advance. When you try to carry Thursday on Monday, you\u2019re carrying it without Thursday\u2019s grace. Of course it feels crushing.",
"So shrink the frame. What actually needs doing today? Do that. Pray about the rest and set it down \u2014 tomorrow\u2019s version of you will have tomorrow\u2019s manna. This is why Jesus taught us to pray for daily bread, not monthly reserves.",
"You don\u2019t need strength for your whole future today. You need it for today. And that\u2019s exactly what\u2019s on offer."],
verse:{ref:"Matthew 6:34",text:"Therefore do not be anxious about tomorrow, for tomorrow will be anxious for itself. Sufficient for the day is its own trouble."},
q:"Which future day are you currently trying to live without its manna?",
pray:"Hand God tomorrow \u2014 out loud, specifically. Then ask for exactly enough strength for what today actually holds."},
{id:"hd3",cat:"harddays",title:"It\u2019s Okay to Not Be Okay",min:2,body:[
"Somewhere along the way, a rumor started that strong Christians are always fine. Smile at church, say \u201cblessed\u201d when asked, keep the hard stuff hidden. One problem: Jesus never lived that way.",
"The shortest verse in the Bible is \u201cJesus wept\u201d \u2014 at a funeral, in public, knowing he was about to raise Lazarus. In Gethsemane he told his best friends, \u201cMy soul is very sorrowful, even to death,\u201d and asked them to stay near. The strongest man who ever lived felt things fully and said so out loud. Pretending fine-ness isn\u2019t faith. It\u2019s just hiding.",
"The Psalms make the same point in songbook form: roughly a third of them are laments \u2014 sacred complaints, tears set to music, questions with no neat answers. God put a crying section in his own hymnal. That means your sadness doesn\u2019t need cleaning up before it\u2019s allowed into prayer. \u201cThe LORD is near to the brokenhearted\u201d \u2014 near, not disappointed.",
"So drop the mask with God first, and then with one safe person. Not-okay is a place Jesus is fully willing to meet you."],
verse:{ref:"Psalm 34:18",text:"The LORD is near to the brokenhearted and saves the crushed in spirit."},
q:"Where are you currently performing \u201cfine\u201d \u2014 and who is one safe person who could hear the real answer?",
pray:"Pray a lament tonight: tell God exactly how not-okay it is, without softening it. He kept a whole book of these. Yours is welcome."},
{id:"gr1",cat:"growing",title:"Tiny Habits, Big Faith",min:2,body:[
"Nobody gets strong from one giant workout, and nobody grows deep faith from one emotional retreat weekend. Psalm 1 describes the person who flourishes: their delight is in God\u2019s word, and they meditate on it \u201cday and night.\u201d Not in heroic bursts \u2014 daily. Like a tree planted by streams of water, drinking a little constantly.",
"Here\u2019s the freeing math of tiny habits: five minutes with God every day beats two hours once a month, and it isn\u2019t close. Read one chapter \u2014 or five verses. Pray on the bus. Memorize this week\u2019s verse while brushing your teeth. Open this app when a feeling hits instead of just scrolling past it. Small, repeated, real.",
"The trick is attaching God-time to something you already do. After breakfast, before practice, lights-out \u2014 anchor it, and the habit builds itself. Miss a day? Fine. Trees don\u2019t die from one dry afternoon. Just come back tomorrow; the stream\u2019s still there.",
"You\u2019re not behind. You\u2019re growing. Roots take time, and they\u2019re worth it \u2014 when heat comes, planted trees don\u2019t wither."],
verse:{ref:"Psalm 1:2-3",text:"...but his delight is in the law of the LORD, and on his law he meditates day and night. He is like a tree planted by streams of water that yields its fruit in its season..."},
q:"What existing daily routine could you attach five minutes with God to, starting tomorrow?",
pray:"Ask God to help you want him daily, not just need him in emergencies. Then set your anchor: tell him when you\u2019ll meet him tomorrow."},
{id:"gr2",cat:"growing",title:"Your Faith, Not Your Parents\u2019",min:2,body:[
"Maybe you grew up in church, prayed the prayers, know the stories. Good \u2014 that\u2019s a gift. But at some point every kid raised around faith faces the question: is this mine, or am I just wearing my family\u2019s?",
"Paul saw this handoff up close. He reminded young Timothy of the \u201csincere faith that dwelt first in your grandmother Lois and your mother Eunice and now, I am sure, dwells in you as well.\u201d Three generations \u2014 but notice: the faith had to dwell in Timothy. Grandma\u2019s faith couldn\u2019t be transferred like a hand-me-down jacket. He had to own it.",
"Owning it starts with honest steps: pray when no one assigned it. Read Scripture to actually find out, not to check a box. Ask your real questions out loud \u2014 borrowed faith avoids questions; owned faith brings them to God. And watch for God moving in your own story, not just your parents\u2019 testimonies. \u201cTaste and see that the LORD is good\u201d is an invitation with your name on it.",
"Secondhand faith gets you to church. Firsthand faith gets you through life. Go get yours."],
verse:{ref:"2 Timothy 1:5",text:"I am reminded of your sincere faith, a faith that dwelt first in your grandmother Lois and your mother Eunice and now, I am sure, dwells in you as well."},
q:"What\u2019s one part of your faith you believe because you\u2019ve tasted it \u2014 not just because you were told?",
pray:"Pray something you\u2019ve never prayed before, in your own words: ask God to make this faith fully, personally yours."},
{id:"gr3",cat:"growing",title:"Doubt Isn\u2019t the Enemy",min:2,body:[
"A dad once brought his suffering son to Jesus and blurted out the most honest sentence in the Gospels: \u201cI believe; help my unbelief!\u201d Faith and doubt in the same breath \u2014 and Jesus didn\u2019t rebuke him. He healed his son.",
"That should retire the fear that doubting disqualifies you. Thomas doubted the resurrection and Jesus didn\u2019t cancel him \u2014 he showed up, offered his scars, and let Thomas touch the evidence. What Jesus opposes isn\u2019t honest questions; it\u2019s never bringing them to him. Doubt handled alone hardens. Doubt brought into the light becomes the doorway to a sturdier faith.",
"So do something with your questions. Write them down. Pray them \u2014 literally, \u201cGod, I don\u2019t get this; help me.\u201d Take them to someone further down the road: a parent, a youth leader, a pastor. Christianity has been fielding hard questions for two thousand years; yours will not break it. Seek, Jesus promised, and you will find \u2014 which assumes seekers start without all the answers.",
"A faith that\u2019s never wrestled is untested. Wrestle honestly, in God\u2019s direction, and you\u2019ll walk away stronger \u2014 maybe with a limp, like Jacob, but blessed."],
verse:{ref:"Mark 9:24",text:"Immediately the father of the child cried out and said, \u201cI believe; help my unbelief!\u201d"},
q:"What\u2019s the question about God you\u2019ve been afraid to say out loud \u2014 and who could you bring it to this week?",
pray:"Pray the father\u2019s prayer word-for-word tonight \u2014 \u201cI believe; help my unbelief\u201d \u2014 and then tell God your actual question."},
{id:"bq1",cat:"bigq",title:"Why Does God Allow Bad Things?",min:3,body:[
"This is the oldest, heaviest question there is, and anyone who hands you a tidy three-step answer is selling something. The Bible itself gives Job \u2014 the book devoted to this question \u2014 no explanation, only an encounter with God himself. So let\u2019s be honest about what we know and don\u2019t.",
"We know this world is broken \u2014 running far from its original design, cracked by sin all the way down. Jesus promised plainly, \u201cIn the world you will have tribulation.\u201d Christianity never claims bad things won\u2019t happen; it claims something stranger: that God can weave even the worst things toward good for those who love him. Joseph said it to the brothers who sold him: \u201cYou meant evil against me, but God meant it for good.\u201d Not \u2014 it was secretly fine. Evil was evil. And God out-worked it.",
"And here\u2019s the answer no other worldview offers: when God dealt with suffering, he didn\u2019t explain it from a distance \u2014 he entered it. The cross means God knows betrayal, injustice, torture, and death from the inside. Whatever you\u2019re asking \u201cwhy\u201d about, you\u2019re asking someone who has scars.",
"You may not get the why in this life. You do get the Who \u2014 present in the pain, promising that one day he\u2019ll wipe every tear and make all things new. Take your why to him directly. He\u2019s heard it before, and he can hold it."],
verse:{ref:"John 16:33",text:"I have said these things to you, that in me you may have peace. In the world you will have tribulation. But take heart; I have overcome the world."},
q:"What \u201cwhy\u201d are you carrying right now \u2014 and have you ever actually asked God the question instead of just carrying it?",
pray:"Ask God your hardest why tonight, out loud, unedited. Job did. The psalmists did. He would rather have your angry questions than your polite distance."},
{id:"bq2",cat:"bigq",title:"How Do I Know God Is Real?",min:2,body:[
"You can\u2019t put God under a microscope \u2014 but that\u2019s not the only kind of knowing there is. You can\u2019t microscope love or justice either, and you\u2019d bet your life they\u2019re real. So where do you look?",
"Look up, first. \u201cThe heavens declare the glory of God\u201d \u2014 a universe fine-tuned with staggering precision, beauty that serves no survival purpose, and the sheer oddity that anything exists at all. Creation doesn\u2019t prove God like a math problem; it points like a signpost. Look at history, second: a carpenter from Nazareth whose life split time in two, whose tomb his enemies couldn\u2019t produce a body for, whose terrified followers became unstoppable overnight. Something happened.",
"Then do what the psalmist dares you to do: \u201cTaste and see that the LORD is good.\u201d Faith isn\u2019t believing without evidence; it\u2019s trusting enough to test the invitation. Pray honestly for a month. Read one Gospel with an open mind. Watch what happens in you. Jeremiah carries God\u2019s own promise: \u201cYou will seek me and find me, when you seek me with all your heart.\u201d",
"The evidence for God isn\u2019t just out there in the stars. It\u2019s waiting in the seeking."],
verse:{ref:"Psalm 34:8",text:"Oh, taste and see that the LORD is good! Blessed is the man who takes refuge in him!"},
q:"Have you ever honestly run the \u201ctaste and see\u201d experiment \u2014 or only debated God from a distance?",
pray:"Pray a seeker\u2019s prayer, even if it feels strange: \u201cGod, if you\u2019re real, show me. I\u2019m genuinely looking.\u201d He honors that prayer \u2014 he promised."},
{id:"bq3",cat:"bigq",title:"What\u2019s God\u2019s Will for My Life?",min:2,body:[
"College, career, who to date, where to live \u2014 \u201cGod\u2019s will\u201d can feel like a hidden treasure map where one wrong step ruins everything. Breathe. Scripture paints it very differently.",
"Here\u2019s the surprise: most of God\u2019s will for you is already published. \u201cRejoice always, pray without ceasing, give thanks in all circumstances; for this is the will of God in Christ Jesus for you.\u201d There it is, in writing. Add Micah\u2019s summary \u2014 do justice, love kindness, walk humbly with your God \u2014 and you have most of the map. God\u2019s will is less about decoding which college and more about who you\u2019re becoming on the way to any of them.",
"For the genuine forks in the road, you\u2019re not left guessing: ask for wisdom \u2014 James says God gives it generously without scolding you for needing it. Get counsel from people who love God and love you. Then here\u2019s the freeing part: choose. A person praying, seeking wisdom, and walking humbly can pick a direction trusting that \u201cthe heart of man plans his way, but the LORD establishes his steps.\u201d God is quite capable of steering a moving ship \u2014 and redirecting one.",
"Stop hunting for the hidden will and start living the revealed one. The path tends to appear under obedient feet."],
verse:{ref:"1 Thessalonians 5:16-18",text:"Rejoice always, pray without ceasing, give thanks in all circumstances; for this is the will of God in Christ Jesus for you."},
q:"Are you using \u201cfinding God\u2019s will\u201d as a reason to wait \u2014 when the revealed part is sitting there undone?",
pray:"Pray without ceasing starts now: talk to God about the decision you\u2019re facing, do it again tomorrow, and keep the conversation running all day. That constant conversation IS walking in his will."}
];

// ============ WEEKLY MEMORY VERSE ============
function isoWeekKey(d){
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const y = d.getUTCFullYear();
  const week = Math.ceil((((d - Date.UTC(y,0,1)) / 86400000) + 1) / 7);
  return y + '-W' + String(week).padStart(2,'0');
}
function prevWeekKey(){ const d = new Date(); d.setDate(d.getDate()-7); return isoWeekKey(d); }
function trackVisit(emotionId){
  const wk = isoWeekKey(new Date());
  const visits = S.get('visits', {});
  if(!visits[wk]) visits[wk] = {};
  visits[wk][emotionId] = (visits[wk][emotionId]||0)+1;
  // keep only last 4 weeks
  const keys = Object.keys(visits).sort();
  while(keys.length > 4){ delete visits[keys.shift()]; }
  S.set('visits', visits);
}
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function getWeeklyVerse(){
  const wk = isoWeekKey(new Date());
  let cur = S.get('memverse', null);
  if(cur && cur.week === wk) return cur;
  const visits = S.get('visits', {});
  const counts = visits[prevWeekKey()] || visits[wk] || {};
  let topEmotion = null, top = 0;
  for(const [k,v] of Object.entries(counts)){ if(v > top){ top = v; topEmotion = k; } }
  const q = S.get('memqueue', []);
  if(q.length){
    const pick = q.shift();
    S.set('memqueue', q);
    cur = { week: wk, ref: pick.ref, text: pick.text, source: 'chosen' };
    S.set('memverse', cur);
    return cur;
  }
  const lastRef = cur ? cur.ref : '';
  let pool, source;
  if(topEmotion && MEMORY_POOLS[topEmotion]){
    pool = MEMORY_POOLS[topEmotion];
    source = DATA.find(e=>e.id===topEmotion).name.toLowerCase();
  } else {
    pool = MEMORY_GENERAL; source = null;
  }
  let pick = pool[hashStr(wk) % pool.length];
  if(pick.ref === lastRef && pool.length > 1) pick = pool[(hashStr(wk)+1) % pool.length];
  cur = { week: wk, ref: pick.ref, text: pick.text, source };
  S.set('memverse', cur);
  return cur;
}
function practiceText(text, mode){
  const words = text.split(' ');
  return words.map((w,i)=>{
    const strip = w.replace(/[^A-Za-z']/g,'');
    if(!strip) return w;
    const blank = (mode===1 && i%2===1) || mode===2;
    if(!blank) return esc(w);
    const first = mode===2 ? strip[0] : '';
    return '<span style="color:var(--blank)">'+first+'_'.repeat(Math.max(2, strip.length - first.length))+'</span>';
  }).join(' ');
}

// ============ FAVORITES ============
function favId(eId, sId, ref){ return eId+'|'+sId+'|'+ref; }
function isFav(id){ return S.get('favs', []).includes(id); }
let lastFavPop = null;
function toggleFav(id){
  let f = S.get('favs', []);
  const adding = !f.includes(id);
  f = adding ? [...f, id] : f.filter(x=>x!==id);
  lastFavPop = adding ? id : null;
  S.set('favs', f); render();
  if(adding) setTimeout(()=>{ lastFavPop = null; }, 400);
}
async function shareVerse(text, ref){
  const msg = '\u201c'+text+'\u201d \u2014 '+ref+' (ESV)';
  if(navigator.share){
    try{ await navigator.share({text: msg}); }catch(e){}
  } else if(navigator.clipboard && navigator.clipboard.writeText){
    try{ await navigator.clipboard.writeText(msg); alert('Verse copied \u2014 paste it anywhere!'); }catch(e){}
  }
}
function findPassage(id){
  const [eId, sId, ref] = id.split('|');
  if(eId === 'read'){
    const r = READS.find(x => x.id === sId); if(!r) return null;
    if(r.verse.ref !== ref) return null;
    return { ref: r.verse.ref, text: r.verse.text,
      why: 'From the read \u201c'+r.title+'\u201d', pray: r.pray,
      emotion: {id:'read'}, sub: {id: r.id} };
  }
  const e = DATA.find(x=>x.id===eId); if(!e) return null;
  const s = e.subs.find(x=>x.id===sId); if(!s) return null;
  const p = s.passages.find(x=>x.ref===ref); if(!p) return null;
  return { ...p, emotion:e, sub:s };
}

}
function inQueue(ref){ return S.get('memqueue', []).some(v => v.ref === ref); }
function queueMemVerse(ref, text){
  const q = S.get('memqueue', []);
  if(!q.some(v => v.ref === ref)){ q.push({ref, text}); S.set('memqueue', q); }
  render();
}
function unqueueMemVerse(ref){
  S.set('memqueue', S.get('memqueue', []).filter(v => v.ref !== ref));
  render();
}
function memControls(ref, text, on){
  if(!on) return '';
  const mv = S.get('memverse', null);
  if(mv && mv.ref === ref){
    return '<div style="margin-top:12px"><span class="chip" style="cursor:default;color:var(--gold);border-color:var(--gold)">\u2713 This week\u2019s memory verse</span></div>';
  }

    + '<button class="chip" data-r="'+esc(ref)+'" data-t="'+esc(text)+'" onclick="queueMemVerse(this.dataset.r, this.dataset.t)">\uFF0B Queue for a later week</button></div>';

    + '<div class="why"><b>Why this verse</b>'+esc(p.why)+'</div>'

    + memControls(p.ref, p.text, on)
    + '</div>';
}

    favs: S.get('favs', []),
    memverse: S.get('memverse', null),
    visits: S.get('visits', {}),
    username: S.get('username', null)
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rooted-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
}
function importBackup(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(data.app !== 'rooted' && data.app !== 'at-all-times') throw new Error('wrong file');
      const n = (data.journal||[]).length, f = (data.favs||[]).length;
      if(!confirm('Restore backup from ' + (data.exported ? data.exported.slice(0,10) : 'unknown date') + '? This will replace what’s on this phone (' + n + ' journal entries, ' + f + ' saved verses).')) { input.value=''; return; }
      if(Array.isArray(data.journal)) S.set('journal', data.journal);
      if(Array.isArray(data.favs)) S.set('favs', data.favs);
      if(data.memverse) S.set('memverse', data.memverse);
      if(data.visits && typeof data.visits === 'object') S.set('visits', data.visits);
      if(typeof data.username === 'string' && data.username) S.set('username', data.username);
      input.value = '';
      render();
      alert('Backup restored!');
    }catch(e){
      input.value = '';
      alert('That doesn’t look like a Rooted backup file.');
    }
  };
  reader.readAsText(file);
}
function addEntry(){
  const t = document.getElementById('jtext').value.trim();
  if(!t) return;
  const entries = S.get('journal', []);
  const d = new Date();
  const date = d.toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
  entries.unshift({date, text:t, mood: JMOOD || null});
  JMOOD = null;
  S.set('journal', entries); render();
}
function delEntry(i){
  if(!confirm('Delete this entry? This can\u2019t be undone.')) return;
  const entries = S.get('journal', []);
  entries.splice(i,1); S.set('journal', entries); render();
}
function beginEdit(i){
  const en = S.get('journal', [])[i];
  EMOOD = (en && en.mood) || null;
  go({screen:'journal', editJ:i});
}
function saveEdit(i){
  const el = document.getElementById('jedit');
  const t = (el && el.value || '').trim();
  if(!t) return;
  const entries = S.get('journal', []);
  if(!entries[i]) return;
  entries[i].text = t;
  entries[i].mood = EMOOD;
  entries[i].edited = true;
  S.set('journal', entries);
  go({editJ:null});
}
function cancelEdit(){ go({editJ:null}); }

function markRead(id){

function renderRead(){
  const r = READS.find(x => x.id === state.readId);
  if(!r){ go({screen:'reads'}); return; }
  const c = READ_CATS.find(x => x.id === r.cat);
  setTint(null);

    + '<button class="share" aria-label="Share verse" data-t="'+esc(r.verse.text)+'" data-r="'+esc(r.verse.ref)+'" onclick="shareVerse(this.dataset.t, this.dataset.r)">'+svg('shareic')+'</button>'
    + '<button class="fav'+(von?' on':'')+(lastFavPop===vfid?' pop':'')+'" aria-label="'+(von?'Remove from favorites':'Save to favorites')+'" onclick="toggleFav(\''+vfid+'\')">'+(von?'\u2605':'\u2606')+'</button></span></div>'
    + memControls(r.verse.ref, r.verse.text, von)
    + '</div>';

let CHAT = S.get('chatlog', []);

function normQ(s){ return s.toLowerCase().replace(/[^a-z0-9\s\u2019']/g,' ').replace(/\u2019/g,"'").replace(/\s+/g,' ').trim(); }
function findEmotionMatch(q){
  for(const e of DATA){
    const n = e.name.toLowerCase();
    if(q === n || q.includes(n)) return e;
    for(const s of e.subs){ if(q === s.name.toLowerCase()) return e; }
  }
  return null;
}
function findTopic(q){
  let best = null, bestScore = 0;
  for(const t of TOPICS){
    let score = 0;
    const names = [t.name.toLowerCase().replace(/\u2019/g,"'"), ...t.keys];
    for(const k of names){
      if(q === k) score = Math.max(score, 100);
      else if(q.includes(k)) score = Math.max(score, 20 + k.length);
      else if(k.includes(q) && q.length >= 3) score = Math.max(score, 10 + q.length);
    }
    if(score > bestScore){ bestScore = score; best = t; }
  }
  return bestScore > 0 ? best : null;
}
function topicById(id){ return TOPICS.find(t => t.id === id); }

function saveChat(){ if(CHAT.length > 60) CHAT = CHAT.slice(-60); S.set('chatlog', CHAT); }
function askSend(){
  const el = document.getElementById('askin');
  const q = (el && el.value || '').trim();
  if(!q) return;
  el.value = '';
  askQuery(q);
}
let PENDING = false;
function askQuery(q){
  if(PENDING) return;
  CHAT.push({who:'me', text:q});
  PENDING = true;
  render();
  setTimeout(()=>window.scrollTo(0, document.body.scrollHeight), 30);
  setTimeout(()=>{
    const nq = normQ(q);
    const t = findTopic(nq);
    if(t){ CHAT.push({who:'app', topic:t.id}); }
    else {
      const e = findEmotionMatch(nq);
      if(e) CHAT.push({who:'app', emotion:e.id});
      else CHAT.push({who:'app', miss:true});
    }
    PENDING = false;
    saveChat(); render();
    setTimeout(()=>window.scrollTo(0, document.body.scrollHeight), 30);
  }, 600);
}
function clearChat(){ CHAT = []; S.set('chatlog', CHAT); render(); }
function showAllTopics(){
  CHAT.push({who:'me', text:'See all topics'});
  CHAT.push({who:'app', all:true});
  saveChat(); render();
  setTimeout(()=>window.scrollTo(0, document.body.scrollHeight), 50);
}

function topicChip(id){
  const t = topicById(id);
  if(!t) return '';
  return '<button class="chip" onclick="askQuery(\''+t.name.replace(/'/g,"\\'")+'\')">'+esc(t.name)+'</button>';
}
function appReplyHTML(m){
  if(m.topic){
    const t = topicById(m.topic);
    if(!t) return '<div class="msg app">Hmm, I lost that one \u2014 try asking again.</div>';
    let h = '<div class="msg app"><div>'+esc(t.intro)+'</div>';
    for(const v of t.verses){
      h += '<div class="mini"><div class="vt">'+esc(v.text)+'</div><div class="vr">\u2014 '+esc(v.ref)+' (ESV)</div></div>';
    }
    if(t.related && t.related.length){
      h += '<div style="margin-top:12px;font-size:.82rem;color:var(--ink-soft)">Related:</div><div class="chips">'+t.related.map(topicChip).join('')+'</div>';
    }
    h += '</div>';
    return h;
  }
  if(m.all){
    const sorted = [...TOPICS].sort((a,b)=>a.name.localeCompare(b.name));
    return '<div class="msg app"><div>Here\u2019s everything I can look up \u2014 all '+sorted.length+' topics:</div>'
      + '<div class="chips">'+sorted.map(t=>topicChip(t.id)).join('')+'</div></div>';
  }
  if(m.emotion){
    const e = DATA.find(x => x.id === m.emotion);
    if(!e) return '';
    return '<div class="msg app"><div>That sounds like a feeling more than a topic \u2014 and the app has a whole section for it, with verses, prayers, and stories.</div>'
      + '<div class="chips"><button class="chip" onclick="openEmotion(\''+e.id+'\')">'+e.emoji+' Open '+esc(e.name)+'</button></div></div>';
  }
  return '<div class="msg app"><div>I don\u2019t have that topic yet \u2014 I\u2019m a curated search, not the whole Bible! Try one of these:</div>'
    + '<div class="chips">'+ASK_SUGGESTIONS.map(s=>'<button class="chip" onclick="askQuery(\''+s.replace(/'/g,"\\'")+'\')">'+esc(s)+'</button>').join('')
    + '<button class="chip" style="border-style:dashed" onclick="showAllTopics()">See all topics\u2026</button></div></div>';
}
function renderAsk(){
  setTint(null);
  let html = '<div class="top"><div><h1 style="font-size:2rem">Ask</h1><div class="sub">Search God\u2019s word by topic</div></div></div>';
  html += '<div class="chatwrap">';
  html += '<div class="msg app"><div>Hi! Ask me about a topic \u2014 like forgiveness, friendship, or courage \u2014 and I\u2019ll show you what God\u2019s word says.</div>'
    + '<div class="chips">'+ASK_SUGGESTIONS.map(s=>'<button class="chip" onclick="askQuery(\''+s.replace(/'/g,"\\'")+'\')">'+esc(s)+'</button>').join('')
    + '<button class="chip" style="border-style:dashed" onclick="showAllTopics()">See all topics\u2026</button></div></div>';
  for(const m of CHAT){
    if(m.who === 'me') html += '<div class="msg me">'+esc(m.text)+'</div>';
    else html += appReplyHTML(m);
  }
  if(PENDING) html += '<div class="msg app"><span class="typing"><span></span><span></span><span></span></span></div>';
  if(CHAT.length && !PENDING) html += '<button class="clearchat" onclick="clearChat()">Clear chat</button>';
  html += '</div>';
  html += '<div class="askbar"><div class="inner">'
    + '<input id="askin" placeholder="Ask about a topic\u2026" enterkeyhint="send" onkeydown="if(event.key===\'Enter\')askSend()">'
    + '<button class="btn" onclick="askSend()">Send</button></div></div>';
  app.innerHTML = html;
}

let lastScreen = null;
function render(){
  if(state.screen !== 'journal') state.editJ = null;
  if(state.screen==='home') renderHome();
  else if(state.screen==='subs') renderSubs();
  else if(state.screen==='passages') renderPassages();
  else if(state.screen==='ask') renderAsk();
  else if(state.screen==='reads') renderReads();
  else if(state.screen==='readlist') renderReadList();
  else if(state.screen==='read') renderRead();
  else if(state.screen==='favorites') renderFavorites();
  else if(state.screen==='journal') renderJournal();
  renderNav();
  if(state.screen !== lastScreen && app.classList){
    app.classList.remove('anim'); void app.offsetWidth; app.classList.add('anim');
    lastScreen = state.screen;
  }
}
render();
